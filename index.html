<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e0e0e; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #FFCC00; font-weight: bold; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>VDS MUSIC</h3>
    <div class="search-box">
        <input id="q" type="text" placeholder="Введите название...">
        <button onclick="sendQuery()">🔍</button>
    </div>
    <div id="status" class="status">Введите запрос и нажмите поиск</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendQuery() {
            const q = document.getElementById("q").value;
            if(!q) return;
            document.getElementById("status").innerText = "⏳ Запрос отправлен боту...";
            
            // Отправляем текст боту и ЗАКРЫВАЕМ приложение
            // Это единственный способ обойти блокировку HTTP на iPhone без SSL
            tg.sendData(q);
        }
    </script>
</body>
</html>
