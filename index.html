<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>VDS Music AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #1a1a20; --surface: #25252e; --accent: #ff3366; --text: #ffffff; --text-muted: #9aa0a6; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #content-area { height: 100vh; overflow-y: auto; padding: 20px 20px 150px 20px; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }
        .track-item { display: flex; align-items: center; background: var(--surface); padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .track-thumb { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 11px; color: var(--text-muted); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(26,26,32,0.95); display: flex; padding: 15px 0 30px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 10px; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: var(--accent); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 90; box-shadow: 0 4px 15px rgba(255,51,102,0.4); }
        #search-overlay { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; transition: 0.3s; padding: 20px; }
        #search-overlay.open { top: 0; }
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg); transition: 0.4s; z-index: 2000; padding: 40px 20px; }
        #full-player.open { top: 0; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .play-main-btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 25px; color: white; font-size: 20px; }
        .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .genre-card { background: var(--surface); padding: 15px; border-radius: 12px; text-align: center; font-size: 14px; font-weight: bold; }
        #mini-player { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #2d2d38; padding: 10px; border-radius: 15px; display: none; align-items: center; z-index: 80; }
    </style>
</head>
<body>
    <div id="content-area">
        <div id="tab-for-you" class="tab-view active">
            <div class="header-flex">
                <h2>Для вас ✨</h2>
                <button class="play-main-btn" onclick="toggleMainPlay()" id="main-play-icon">▶</button>
            </div>
            <div id="for-you-results"></div>
        </div>
        <div id="tab-genres" class="tab-view">
            <h2>Жанры 🎸</h2>
            <div id="genre-grid" class="genre-grid"></div>
            <div id="genre-results" style="display:none">
                <button onclick="showGenreGrid()" style="background:none; border:none; color:var(--accent); margin-bottom:15px;">🔙 Назад</button>
                <div id="genre-list"></div>
            </div>
        </div>
        <div id="tab-collection" class="tab-view"><h2>Коллекция ❤️</h2><div id="collection-results"></div></div>
        <div id="tab-history" class="tab-view"><h2>История 🕒</h2><div id="history-results"></div></div>
    </div>

    <div class="fab" onclick="openSearch()">🔍</div>
    
    <div id="search-overlay">
        <div class="header-flex">
            <input id="search-input" style="flex:1; padding:12px; border-radius:10px; border:none; background:#333; color:white;" placeholder="Поиск музыки..." onkeydown="if(event.key==='Enter') doSearch()">
            <div onclick="closeSearch()" style="margin-left:15px;">✕</div>
        </div>
        <div id="search-results-list" style="margin-top:20px;"></div>
    </div>

    <div id="mini-player" onclick="openFullPlayer()">
        <img id="mp-thumb" class="track-thumb" style="width:40px; height:40px; margin-right:10px;">
        <div class="track-info"><div id="mp-title" class="track-title"></div></div>
        <div onclick="event.stopPropagation(); togglePlay();" id="mp-play-btn" style="font-size:24px; color:var(--accent); padding:0 10px;">⏸</div>
    </div>

    <div id="full-player">
        <div onclick="closeFullPlayer()" style="font-size:30px;">✕</div>
        <img id="fp-cover" style="width:100%; aspect-ratio:1; border-radius:20px; object-fit:cover; margin-top:20px;">
        <h2 id="fp-title" style="margin:20px 0 5px;"></h2>
        <p id="fp-artist" style="color:var(--text-muted);"></p>
        <div style="display:flex; justify-content:center; align-items:center; gap:40px; margin-top:40px; font-size:40px;">
            <div onclick="playPrev()">⏮</div>
            <div onclick="togglePlay()" id="fp-play-btn">⏸</div>
            <div onclick="playNext()">⏭</div>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('for-you', this)"><span class="nav-icon">✨</span>Для вас</div>
        <div class="nav-item" onclick="switchTab('genres', this)"><span class="nav-icon">🎸</span>Жанры</div>
        <div class="nav-item" onclick="switchTab('collection', this)"><span class="nav-icon">❤️</span>Коллекция</div>
        <div class="nav-item" onclick="switchTab('history', this)"><span class="nav-icon">🕒</span>История</div>
    </div>

    <script>
        const API = "https://surround-subpar-distort.ngrok-free.dev";
        const audio = document.getElementById('mainAudio');
        let collection = JSON.parse(localStorage.getItem('vds_collection') || '[]');
        let history = JSON.parse(localStorage.getItem('vds_history') || '[]');
        let currentQueue = [], currentIndex = -1;

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'collection') renderCollection();
            if(tab === 'history') renderHistory();
        }

        async function loadSmartRandom() {
            const results = document.getElementById('for-you-results');
            results.innerHTML = "<p>Подбираем...</p>";
            const seeds = collection.map(t => t.title).join('||');
            const r = await fetch(`${API}/smart_random?seeds=${encodeURIComponent(seeds)}`, {headers:{"ngrok-skip-browser-warning":"1"}});
            const d = await r.json();
            currentQueue = d.tracks;
            results.innerHTML = d.tracks.map((t, i) => buildTrackHTML(t, i, 'for-you')).join('');
        }

        function buildTrackHTML(t, i, context) {
            const isFav = collection.some(c => c.id === t.id);
            return `<div class="track-item" onclick="playFromContext(${i}, '${context}')">
                <img src="${t.thumb}" class="track-thumb">
                <div class="track-info"><div class="track-title">${t.title}</div><div class="track-artist">${t.artist}</div></div>
                <div onclick="event.stopPropagation(); toggleCollection(${JSON.stringify(t).replace(/"/g, '&quot;')})">${isFav ? '❤️' : '🤍'}</div>
            </div>`;
        }

        function toggleMainPlay() {
            if(currentIndex === -1 && currentQueue.length > 0) { playTrack(0); }
            else { togglePlay(); }
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); } else { audio.pause(); }
            updatePlayUI();
        }

        function updatePlayUI() {
            const icon = audio.paused ? '▶' : '⏸';
            document.getElementById('mp-play-btn').innerText = icon;
            document.getElementById('fp-play-btn').innerText = icon;
            document.getElementById('main-play-icon').innerText = icon;
        }

        function playFromContext(i, ctx) {
            if(ctx === 'collection') currentQueue = collection;
            if(ctx === 'history') currentQueue = history;
            if(ctx === 'search') { closeSearch(); }
            playTrack(i);
        }

        async function playTrack(i) {
            if(i < 0 || i >= currentQueue.length) return;
            currentIndex = i;
            const t = currentQueue[i];
            document.getElementById('mini-player').style.display = 'flex';
            document.getElementById('mp-title').innerText = t.title;
            document.getElementById('mp-thumb').src = t.thumb;
            document.getElementById('fp-title').innerText = t.title;
            document.getElementById('fp-artist').innerText = t.artist;
            document.getElementById('fp-cover').src = t.thumb;
            
            audio.src = `${API}/stream/${t.id}?url=${encodeURIComponent(t.yt_url)}`;
            audio.play();
            updatePlayUI();
            
            history = history.filter(h => h.id !== t.id);
            history.unshift(t);
            localStorage.setItem('vds_history', JSON.stringify(history.slice(0,50)));
        }

        function toggleCollection(t) {
            const idx = collection.findIndex(c => c.id === t.id);
            if(idx > -1) collection.splice(idx, 1); else collection.push(t);
            localStorage.setItem('vds_collection', JSON.stringify(collection));
            renderCollection();
        }

        const genres = ["Pop", "Hip-Hop", "Techno", "Dubstep", "House", "Rock", "Lo-Fi", "Phonk", "Jazz", "Metal"];
        function renderGenres() {
            document.getElementById('genre-grid').innerHTML = genres.map(g => `<div class="genre-card" onclick="loadGenre('${g}')">${g}</div>`).join('');
        }
        async function loadGenre(g) {
            document.getElementById('genre-grid').style.display = 'none';
            document.getElementById('genre-results').style.display = 'block';
            document.getElementById('genre-list').innerHTML = "⏳...";
            const r = await fetch(`${API}/genre?q=${encodeURIComponent(g)}`, {headers:{"ngrok-skip-browser-warning":"1"}});
            const d = await r.json();
            currentQueue = d.tracks;
            document.getElementById('genre-list').innerHTML = d.tracks.map((t, i) => buildTrackHTML(t, i, 'genre')).join('');
        }
        function showGenreGrid() { document.getElementById('genre-grid').style.display = 'grid'; document.getElementById('genre-results').style.display = 'none'; }

        function openSearch() { document.getElementById('search-overlay').classList.add('open'); document.getElementById('search-input').focus(); }
        function closeSearch() { document.getElementById('search-overlay').classList.remove('open'); }
        async function doSearch() {
            const q = document.getElementById('search-input').value;
            const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`, {headers:{"ngrok-skip-browser-warning":"1"}});
            const d = await r.json();
            currentQueue = d.tracks;
            document.getElementById('search-results-list').innerHTML = d.tracks.map((t, i) => buildTrackHTML(t, i, 'search')).join('');
        }

        function renderCollection() { document.getElementById('collection-results').innerHTML = collection.map((t, i) => buildTrackHTML(t, i, 'collection')).join(''); }
        function renderHistory() { document.getElementById('history-results').innerHTML = history.map((t, i) => buildTrackHTML(t, i, 'history')).join(''); }
        function openFullPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('open'); }
        function playNext() { playTrack(currentIndex+1); }
        function playPrev() { playTrack(currentIndex-1); }
        audio.onended = playNext;

        renderGenres();
        loadSmartRandom();
    </script>
</body>
</html>
