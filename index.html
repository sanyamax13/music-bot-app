<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vibe Player Debug</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --accent: #FFCC00; --bg: #0e0e0e; --text: #fff; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 150px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
  input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
  .btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; }
  .track-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
  #player { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid #333; display: none; z-index: 1000; }
  audio { width: 100%; filter: invert(1); }
  /* СТИЛИ ДЛЯ ЛОГОВ */
  #debug-log { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; height: 80px; overflow-y: auto; border: 1px solid #333; margin-top: 20px; border-radius: 8px; }
</style>
</head>
<body>

<div class="search-row">
  <input id="q" type="text" placeholder="Введите название...">
  <button class="btn" onclick="search()">🔍</button>
</div>

<div id="results"></div>

<div id="debug-log">Система: Ожидание запроса...</div>

<div id="player">
  <div id="track-title" style="font-weight:bold; margin-bottom:10px; font-size:14px;"></div>
  <audio id="audio" controls autoplay></audio>
</div>

<script>
  let tg = window.Telegram.WebApp;
  tg.expand();

  const API = "http://72.56.96.49:8000"; 

  function log(msg) {
    const logEl = document.getElementById('debug-log');
    logEl.innerHTML += `<br>> ${msg}`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  async function search() {
    const q = document.getElementById('q').value;
    if(!q) return;
    
    log(`Начинаю поиск: ${q}`);
    document.getElementById('results').innerHTML = "⏳ Поиск...";
    
    try {
      const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      log(`Статус ответа: ${r.status}`);
      const data = await r.json();
      
      log(`Найдено треков: ${data.tracks.length}`);
      let html = '';
      data.tracks.forEach(t => {
        html += `
          <div class="track-card" onclick="play('${t.id}', '${encodeURIComponent(t.yt_url)}', '${t.title.replace(/'/g, "")}')">
            <b>${t.title}</b><br><small style="color:#888">${t.artist}</small>
          </div>`;
      });
      document.getElementById('results').innerHTML = html;
    } catch (e) {
      log(`ОШИБКА ПОИСКА: ${e.message}`);
      document.getElementById('results').innerHTML = "❌ Ошибка. Проверь логи внизу.";
    }
  }

  function play(id, url, title) {
    log(`Запуск потока для: ${decodeURIComponent(title)}`);
    document.getElementById('player').style.display = 'block';
    document.getElementById('track-title').innerText = decodeURIComponent(title);
    
    const audio = document.getElementById('audio');
    const streamUrl = `${API}/stream/${id}?url=${url}`;
    log(`URL стрима: ${streamUrl}`);
    
    audio.src = streamUrl;
    audio.onerror = (e) => log(`ОШИБКА ПЛЕЕРА: Ошибка загрузки аудио`);
    audio.onplay = () => log(`▶ Воспроизведение началось`);
    audio.play();
  }
</script>
</body>
</html>
