<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>VDS Music PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #FFCC00; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-bottom: 180px; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; font-size: 16px; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--accent); color:#000; font-weight: bold; }
        .track-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #333; padding: 20px; box-sizing: border-box; display: none; }
        #log { background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 10px; margin-top: 20px; max-height: 80px; overflow-y: auto; }
        .controls { width: 100%; filter: invert(1) brightness(1.5); }
    </style>
</head>
<body>
    <div class="search-row">
        <input id="q" type="text" placeholder="Поиск музыки...">
        <button class="btn" onclick="search()">Найти</button>
    </div>
    <div id="results"></div>
    <div id="log">Статус: Готов</div>
    <div id="player-bar">
        <div id="now-playing" style="font-size: 13px; margin-bottom: 10px; color: var(--accent); font-weight: bold;"></div>
        <div id="audio-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = "https://surround-subpar-distort.ngrok-free.dev";

        function addLog(msg) {
            const l = document.getElementById('log');
            l.innerText += "\n> " + msg;
            l.scrollTop = l.scrollHeight;
        }

        async function search() {
            const q = document.getElementById('q').value;
            if(!q) return;
            document.getElementById('results').innerHTML = "⏳ Поиск...";
            try {
                const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`, {
                    headers: { "ngrok-skip-browser-warning": "69420" }
                });
                const data = await r.json();
                let html = '';
                data.tracks.forEach(t => {
                    html += `<div class="track-card" onclick="play('${t.id}', '${encodeURIComponent(t.yt_url)}', '${t.title.replace(/'/g, "")}')">
                        <div><b>${t.title}</b><br><small style="color:#888">${t.artist}</small></div>
                        <div style="color:var(--accent)">▶</div>
                    </div>`;
                });
                document.getElementById('results').innerHTML = html;
            } catch (e) { addLog("Ошибка: " + e.message); }
        }

        function play(id, url, title) {
            document.getElementById('player-bar').style.display = 'block';
            document.getElementById('now-playing').innerText = "🎶 " + title;
            addLog("Инициализация аудио...");

            // ПОЛНАЯ ПЕРЕЗАГРУЗКА ЭЛЕМЕНТА AUDIO ДЛЯ IOS
            const container = document.getElementById('audio-container');
            container.innerHTML = `<audio id="audio" class="controls" controls autoplay playsinline preload="auto"></audio>`;
            
            const audio = document.getElementById('audio');
            audio.src = `${API}/stream/${id}?url=${url}`;
            
            audio.play().then(() => {
                addLog("✅ Воспроизведение началось");
            }).catch(e => {
                addLog("❌ Ошибка: " + e.name);
            });
        }
    </script>
</body>
</html>
