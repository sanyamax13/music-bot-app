<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>VDS Music PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #FFCC00; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-bottom: 200px; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; font-size: 16px;}
        .btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; }
        .track-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center;}
        
        #debug-panel { background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 15px; border-radius: 12px; border: 1px solid #444; margin-top: 20px; max-height: 120px; overflow-y: auto;}
        
        #player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 20px; box-sizing: border-box; display: none; border-top: 1px solid #333; }
        audio { width: 100%; filter: invert(1); }
        .progress-text { color: var(--accent); font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="search-row">
        <input id="q" type="text" placeholder="Поиск трека...">
        <button class="btn" onclick="search()">Найти</button>
    </div>
    <div id="results"></div>

    <div id="debug-panel">Система загружена. Обход Ngrok активирован.</div>

    <div id="player-bar">
        <div id="track-name" style="font-size: 14px; font-weight: bold; margin-bottom: 5px;"></div>
        <div id="loading-status" class="progress-text"></div>
        <audio id="audio" controls playsinline></audio>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = "https://surround-subpar-distort.ngrok-free.dev";
        let currentObjectUrl = null;

        function log(msg) {
            const panel = document.getElementById('debug-panel');
            panel.innerHTML += `\n> ${msg}`;
            panel.scrollTop = panel.scrollHeight;
        }

        async function search() {
            const q = document.getElementById('q').value;
            if(!q) return;
            log("Ищу: " + q);
            document.getElementById('results').innerHTML = "<p style='text-align:center'>⏳ Поиск...</p>";
            try {
                const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`, { 
                    headers: {"ngrok-skip-browser-warning":"69420"} 
                });
                const d = await r.json();
                log("Найдено: " + d.tracks.length);
                let h = '';
                d.tracks.forEach(t => {
                    h += `<div class="track-card" onclick="play('${t.id}', '${encodeURIComponent(t.yt_url)}', '${t.title.replace(/'/g, "")}')">
                        <div><b>${t.title}</b><br><small style="color:#888">${t.artist}</small></div>
                        <div style="color:var(--accent)">▶</div></div>`;
                });
                document.getElementById('results').innerHTML = h;
            } catch (e) { log("Ошибка поиска: " + e.message); }
        }

        async function play(id, url, title) {
            const a = document.getElementById('audio');
            const status = document.getElementById('loading-status');
            
            document.getElementById('player-bar').style.display = 'block';
            document.getElementById('track-name').innerText = title;
            
            // Сбрасываем старый трек
            a.pause();
            if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
            
            status.innerText = "⏳ Скачивание аудио (обход защиты)...";
            log("Загрузка в память: " + title);

            try {
                // Скачиваем аудио через fetch, чтобы передать заголовки!
                const response = await fetch(`${API}/stream/${id}?url=${url}`, {
                    headers: { "ngrok-skip-browser-warning": "69420" }
                });

                if (!response.ok) throw new Error("Сервер вернул ошибку");

                // Превращаем ответ в аудио-файл внутри браузера
                const blob = await response.blob();
                currentObjectUrl = URL.createObjectURL(blob);

                status.innerText = ""; // Прячем статус
                log("✅ Файл загружен в память. Запуск...");

                // Отдаем чистый файл плееру
                a.src = currentObjectUrl;
                a.load();
                
                a.play().then(() => log("🎵 Музыка играет!"))
                .catch(e => log("❌ Ошибка автоплея: Нажми Play вручную."));

            } catch (e) {
                status.innerText = "❌ Ошибка загрузки";
                log("Критическая ошибка: " + e.message);
            }
        }
    </script>
</body>
</html>
