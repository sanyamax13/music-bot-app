<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vibe Player</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --accent: #FFCC00; --bg: #0e0e0e; --text: #fff; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
  input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
  .btn { padding: 12px 20px; border-radius: 10px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; }
  #results { margin-top: 20px; }
  .track-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
  .track-card:active { border-color: var(--accent); }
  #player { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid #333; display: none; }
  audio { width: 100%; filter: invert(1); }
</style>
</head>
<body>

<div class="search-row">
  <input id="q" type="text" placeholder="Введите название...">
  <button class="btn" onclick="search()">Поиск</button>
</div>

<div id="results"></div>

<div id="player">
  <div id="track-title" style="font-weight:bold; margin-bottom:10px; font-size:14px;"></div>
  <audio id="audio" controls autoplay></audio>
</div>

<script>
  let tg = window.Telegram.WebApp;
  tg.expand();

  // ВАЖНО: Замени на свой IP, но оставь :8000
  const API = "http://72.56.96.49:8000"; 

  async function search() {
    const q = document.getElementById('q').value;
    if(!q) return;
    
    document.getElementById('results').innerHTML = "⏳ Ищу...";
    
    try {
      // Прямой запрос к серверу
      const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await r.json();
      
      let html = '';
      data.tracks.forEach(t => {
        html += `
          <div class="track-card" onclick="play('${t.id}', '${encodeURIComponent(t.yt_url)}', '${t.title.replace(/'/g, "")}')">
            <b>${t.title}</b><br><small style="color:#888">${t.artist}</small>
          </div>`;
      });
      document.getElementById('results').innerHTML = html;
    } catch (e) {
      document.getElementById('results').innerHTML = "❌ Ошибка. Убедись, что VDS запущен.";
    }
  }

  function play(id, url, title) {
    document.getElementById('player').style.display = 'block';
    document.getElementById('track-title').innerText = decodeURIComponent(title);
    const audio = document.getElementById('audio');
    audio.src = `${API}/stream/${id}?url=${url}`;
    audio.play();
  }
</script>
</body>
</html>
