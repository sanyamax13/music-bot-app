<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --yandex-yellow: #FFCC00; --bg: #000; --card: #1A1A1A; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; padding-bottom: 120px; }
        .nav-tabs { display: flex; justify-content: space-around; background: #111; padding: 15px 0; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #222; }
        .tab { color: #888; font-weight: bold; font-size: 14px; cursor: pointer; padding: 5px 10px; }
        .tab.active { color: var(--yandex-yellow); border-bottom: 2px solid var(--yandex-yellow); }
        .section { padding: 20px; }
        .genre-card { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; font-weight: bold; border-left: 5px solid var(--yandex-yellow); }
        .track-item { display: flex; align-items: center; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .track-info { margin-left: 15px; flex-grow: 1; overflow: hidden; }
        .track-info b { display: block; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .play-btn { background: var(--yandex-yellow); border: none; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; flex-shrink: 0; }
        .bottom-player { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid #333; padding: 15px; box-sizing: border-box; }
        audio { width: 100%; height: 35px; margin-top: 10px; filter: invert(1); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        .search-btn { width: 100%; padding: 15px; background: var(--yandex-yellow); border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="nav-tabs">
        <div class="tab active" onclick="showSec('home', this)">Главная</div>
        <div class="tab" onclick="showSec('charts', this)">Чарты</div>
        <div class="tab" onclick="showSec('genres', this)">Жанры</div>
    </div>

    <div id="home" class="section">
        <h2 style="color: var(--yandex-yellow);">Поиск музыки</h2>
        <input type="text" id="search" placeholder="Артист или название...">
        <button class="search-btn" onclick="apiSearch()">НАЙТИ И ИГРАТЬ</button>
        <div id="status" style="margin-top: 15px; color: #888; font-size: 14px;"></div>
    </div>

    <div id="charts" class="section" style="display:none;">
        <h2 style="color: var(--yandex-yellow);">Топ недели</h2>
        <div id="charts-list">Загрузка чартов...</div>
    </div>

    <div id="genres" class="section" style="display:none;">
        <h2>Жанры</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="genre-card" onclick="apiSearch('Phonk')">Phonk</div>
            <div class="genre-card" onclick="apiSearch('Lo-fi')">Lo-fi</div>
            <div class="genre-card" onclick="apiSearch('Rock')">Rock</div>
            <div class="genre-card" onclick="apiSearch('Rap')">Rap</div>
        </div>
    </div>

    <div class="bottom-player" id="player-ui" style="display: none;">
        <div id="current-title" style="font-size: 14px; font-weight: bold;"></div>
        <audio id="main-audio" controls autoplay></audio>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const SERVER = "http://72.56.96.49:8000";

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(id === 'charts') loadCharts();
        }

        async function apiSearch(q) {
            let query = q || document.getElementById('search').value;
            if(!query) return;
            document.getElementById('status').innerText = "⏳ Ищем на сервере...";
            
            try {
                const response = await fetch(`${SERVER}/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                playTrack(data.url, data.title);
                document.getElementById('status').innerText = "✅ Играет: " + data.title;
            } catch (e) {
                document.getElementById('status').innerText = "❌ Ошибка загрузки";
            }
        }

        async function loadCharts() {
            const res = await fetch(`${SERVER}/api/charts`);
            const data = await res.json();
            let html = '';
            data.forEach(t => {
                html += `<div class="track-item">
                    <button class="play-btn" onclick="apiSearch('${t.query}')">▶</button>
                    <div class="track-info"><b>${t.title}</b><small>${t.artist}</small></div>
                </div>`;
            });
            document.getElementById('charts-list').innerHTML = html;
        }

        function playTrack(url, title) {
            document.getElementById('player-ui').style.display = 'block';
            document.getElementById('current-title').innerText = title;
            const audio = document.getElementById('main-audio');
            audio.src = url;
            audio.play();
        }
    </script>
</body>
</html>
