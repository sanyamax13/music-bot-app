<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>VDS Music AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #1a1a20; --surface: #25252e; --accent: #ff3366; --text: #ffffff; --text-muted: #9aa0a6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        #content-area { height: 100vh; overflow-y: auto; padding: 20px 20px 150px 20px; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }
        
        .track-item { display: flex; align-items: center; background: var(--surface); padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .track-thumb { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 11px; color: var(--text-muted); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(26,26,32,0.95); display: flex; padding: 15px 0 30px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 10px; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: var(--accent); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(255,51,102,0.4); z-index: 90; }
        
        #mini-player { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #2d2d38; padding: 10px; border-radius: 15px; display: none; align-items: center; z-index: 80; border: 1px solid #444; }
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg); transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 2000; padding: 40px 20px; }
        #full-player.open { top: 0; }
        
        .fp-cover { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 40px; font-size: 35px; }
        .fav-heart { font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="content-area">
        <div id="tab-for-you" class="tab-view active">
            <h2>Для вас ✨</h2>
            <div id="for-you-results"></div>
        </div>
        <div id="tab-collection" class="tab-view">
            <h2>Коллекция ❤️</h2>
            <div id="collection-results"></div>
        </div>
        <div id="tab-history" class="tab-view">
            <h2>История 🕒</h2>
            <div id="history-results"></div>
        </div>
    </div>

    <div class="fab" onclick="alert('Поиск будет в следующем обновлении!')">🔍</div>
    
    <div id="mini-player" onclick="openFullPlayer()">
        <img id="mp-thumb" class="track-thumb" style="margin-right: 10px;">
        <div class="track-info">
            <div id="mp-title" class="track-title"></div>
        </div>
        <div onclick="event.stopPropagation(); togglePlay();" id="mp-play-btn" style="font-size:24px; padding: 0 10px; color:var(--accent);">⏸</div>
    </div>

    <div id="full-player">
        <div onclick="closeFullPlayer()" style="font-size:30px; margin-bottom: 20px;">✕</div>
        <img id="fp-cover" class="fp-cover">
        <h2 id="fp-title" style="margin: 20px 0 5px 0;"></h2>
        <p id="fp-artist" style="color:var(--text-muted); margin: 0;"></p>
        
        <div class="controls">
            <div onclick="playPrev()">⏮</div>
            <div onclick="togglePlay()" id="fp-play-btn" style="background: var(--accent); width: 70px; height: 70px; border-radius: 35px; display: flex; align-items: center; justify-content: center;">⏸</div>
            <div onclick="playNext()">⏭</div>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('for-you', this)"><span class="nav-icon">✨</span>Для вас</div>
        <div class="nav-item" onclick="switchTab('collection', this)"><span class="nav-icon">❤️</span>Коллекция</div>
        <div class="nav-item" onclick="switchTab('history', this)"><span class="nav-icon">🕒</span>История</div>
    </div>

    <script>
        const API = "https://surround-subpar-distort.ngrok-free.dev";
        const tg = window.Telegram.WebApp;
        tg.expand();

        let collection = JSON.parse(localStorage.getItem('vds_collection') || '[]');
        let history = JSON.parse(localStorage.getItem('vds_history') || '[]');
        let currentQueue = [], currentIndex = -1;
        const audio = document.getElementById('mainAudio');

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'collection') renderCollection();
            if(tab === 'history') renderHistory();
            if(tab === 'for-you') loadSmartRandom();
        }

        async function loadSmartRandom() {
            const results = document.getElementById('for-you-results');
            results.innerHTML = "<p style='text-align:center'>🪄 ИИ подбирает музыку...</p>";
            const seeds = collection.map(t => t.title).join('||');
            const r = await fetch(`${API}/smart_random?seeds=${encodeURIComponent(seeds)}`, {headers:{"ngrok-skip-browser-warning":"1"}});
            const d = await r.json();
            currentQueue = d.tracks;
            results.innerHTML = d.tracks.map((t, i) => buildTrackHTML(t, i, 'for-you')).join('');
        }

        function buildTrackHTML(t, i, context) {
            const isFav = collection.some(c => c.id === t.id);
            return `
                <div class="track-item" onclick="playFromContext(${i}, '${context}')">
                    <img src="${t.thumb}" class="track-thumb">
                    <div class="track-info">
                        <div class="track-title">${t.title}</div>
                        <div class="track-artist">${t.artist}</div>
                    </div>
                    <div class="fav-heart" onclick="event.stopPropagation(); toggleCollection(${JSON.stringify(t).replace(/"/g, '&quot;')})">
                        ${isFav ? '❤️' : '🤍'}
                    </div>
                </div>`;
        }

        function toggleCollection(track) {
            const idx = collection.findIndex(c => c.id === track.id);
            if(idx > -1) collection.splice(idx, 1);
            else collection.push(track);
            localStorage.setItem('vds_collection', JSON.stringify(collection));
            renderCollection();
            loadSmartRandom(); // Обновляем рекомендации
        }

        function renderCollection() {
            document.getElementById('collection-results').innerHTML = collection.map((t, i) => buildTrackHTML(t, i, 'collection')).join('');
        }

        function renderHistory() {
            document.getElementById('history-results').innerHTML = history.map((t, i) => buildTrackHTML(t, i, 'history')).join('');
        }

        function playFromContext(i, context) {
            if(context === 'collection') currentQueue = collection;
            if(context === 'history') currentQueue = history;
            playTrack(i);
        }

        async function playTrack(i) {
            if(i < 0 || i >= currentQueue.length) return;
            currentIndex = i;
            const t = currentQueue[i];
            
            // UI
            document.getElementById('mini-player').style.display = 'flex';
            document.getElementById('mp-title').innerText = t.title;
            document.getElementById('mp-thumb').src = t.thumb;
            document.getElementById('fp-title').innerText = t.title;
            document.getElementById('fp-artist').innerText = t.artist;
            document.getElementById('fp-cover').src = t.thumb;
            
            // History
            history = history.filter(h => h.id !== t.id);
            history.unshift(t);
            if(history.length > 50) history.pop();
            localStorage.setItem('vds_history', JSON.stringify(history));

            // Audio
            audio.src = `${API}/stream/${t.id}?url=${encodeURIComponent(t.yt_url)}`;
            audio.play();
            updateMediaSession(t);
            updatePlayUI(true);
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); updatePlayUI(true); }
            else { audio.pause(); updatePlayUI(false); }
        }

        function updatePlayUI(playing) {
            const btn = playing ? '⏸' : '▶';
            document.getElementById('mp-play-btn').innerText = btn;
            document.getElementById('fp-play-btn').innerText = btn;
        }

        function playNext() { playTrack(currentIndex + 1); }
        function playPrev() { playTrack(currentIndex - 1); }
        audio.onended = playNext;

        function updateMediaSession(t) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.title,
                    artist: t.artist,
                    artwork: [{ src: t.thumb, sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.setActionHandler('play', () => { audio.play(); updatePlayUI(true); });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); updatePlayUI(false); });
                navigator.mediaSession.setActionHandler('nexttrack', playNext);
                navigator.mediaSession.setActionHandler('previoustrack', playPrev);
            }
        }

        function openFullPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('open'); }
        
        loadSmartRandom();
    </script>
</body>
</html>
