<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Vibe Streaming</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0b0b0b; --accent: #FFCC00; --card: #161616; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        .tabs { display: flex; background: #111; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #888; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .screen { display: none; padding: 15px; padding-bottom: 120px; }
        .screen.active { display: block; }

        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; }

        .track-item { display: flex; align-items: center; gap: 12px; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .track-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #888; }

        /* PLAYER BAR */
        #player-bar { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid #333; padding: 15px; z-index: 100; }
        .player-info { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        #pb-thumb { width: 40px; height: 40px; border-radius: 6px; }
        .player-ctrl { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .play-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .progress-cont { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="range"] { accent-color: var(--accent); height: 4px; cursor: pointer; }
        .time { font-size: 10px; color: #666; width: 30px; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('search', this)">Поиск</button>
    <button class="tab-btn" onclick="showTab('playlists', this)">Плейлисты</button>
</div>

<div id="search" class="screen active">
    <div class="search-row">
        <input id="q" type="text" placeholder="Трек или артист..." onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn" onclick="doSearch()">🔍</button>
    </div>
    <div id="results"></div>
</div>

<div id="playlists" class="screen">
    <input id="pl-name" placeholder="Название плейлиста...">
    <button class="btn" onclick="createPL()" style="margin: 10px 0; width: 100%;">Создать плейлист</button>
    <div id="pl-list"></div>
</div>

<div id="player-bar" style="display: none;">
    <div class="player-info">
        <img id="pb-thumb" src="">
        <div class="track-info">
            <div id="pb-title" class="track-title"></div>
            <div id="pb-artist" class="track-artist"></div>
        </div>
    </div>
    <div class="player-ctrl">
        <button onclick="prevTrack()" style="background:none; border:none; color:white; font-size:20px;">⏮</button>
        <button id="main-play" class="play-btn" onclick="togglePlay()">▶</button>
        <button onclick="nextTrack()" style="background:none; border:none; color:white; font-size:20px;">⏭</button>
    </div>
    <div class="progress-cont">
        <span class="time" id="t-cur">0:00</span>
        <input type="range" id="progress" value="0" max="100" oninput="seek(this.value)">
        <span class="time" id="t-end">0:00</span>
    </div>
</div>

<audio id="audio"></audio>

<script>
    const API = "http://72.56.96.49:8000";
    const tg = window.Telegram.WebApp;
    const audio = document.getElementById("audio");
    let queue = [];
    let currentIndex = 0;

    tg.expand();

    function showTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'playlists') loadPlaylists();
    }

    async function doSearch() {
        const q = document.getElementById("q").value;
        if(!q) return;
        const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        renderTracks(data.tracks, document.getElementById("results"));
    }

    function renderTracks(tracks, container) {
        container.innerHTML = "";
        tracks.forEach((t, i) => {
            const div = document.createElement("div");
            div.className = "track-item";
            div.innerHTML = `<img class="track-thumb" src="${t.thumbnail}">
                             <div class="track-info"><div class="track-title">${t.title}</div><div class="track-artist">${t.artist}</div></div>
                             <button class="btn" onclick="event.stopPropagation(); addTrackToPL(${JSON.stringify(t).replace(/"/g,'&quot;')})">+</button>`;
            div.onclick = () => playTrack(i, tracks);
            container.appendChild(div);
        });
    }

    function playTrack(index, list) {
        queue = list;
        currentIndex = index;
        const t = queue[currentIndex];
        
        document.getElementById("player-bar").style.display = "block";
        document.getElementById("pb-thumb").src = t.thumbnail;
        document.getElementById("pb-title").innerText = t.title;
        document.getElementById("pb-artist").innerText = t.artist;
        
        audio.src = `${API}/stream/${t.id}?url=${encodeURIComponent(t.yt_url)}`;
        audio.play();
        document.getElementById("main-play").innerText = "⏸";
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); document.getElementById("main-play").innerText = "⏸"; }
        else { audio.pause(); document.getElementById("main-play").innerText = "▶"; }
    }

    function nextTrack() { if(currentIndex < queue.length - 1) playTrack(currentIndex + 1, queue); }
    function prevTrack() { if(currentIndex > 0) playTrack(currentIndex - 1, queue); }

    audio.ontimeupdate = () => {
        const cur = audio.currentTime, dur = audio.duration || 0;
        document.getElementById("t-cur").innerText = fmt(cur);
        document.getElementById("t-end").innerText = fmt(dur);
        document.getElementById("progress").value = dur ? (cur/dur)*100 : 0;
    };

    function seek(v) { if(audio.duration) audio.currentTime = (v/100) * audio.duration; }
    function fmt(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }

    // ПЛЕЙЛИСТЫ
    async function loadPlaylists() {
        const r = await fetch(`${API}/playlists/${tg.initDataUnsafe.user?.id || 0}`);
        const data = await r.json();
        document.getElementById("pl-list").innerHTML = data.playlists.map(pl => 
            `<div class="track-item" onclick="loadPLTracks(${pl.id})">${pl.name}</div>`).join("");
    }

    async function createPL() {
        const name = document.getElementById("pl-name").value;
        await fetch(`${API}/playlists`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user_id: tg.initDataUnsafe.user?.id || 0, name})
        });
        loadPlaylists();
    }

    async function loadPLTracks(id) {
        const r = await fetch(`${API}/playlists/${id}/tracks`);
        const data = await r.json();
        renderTracks(data.tracks, document.getElementById("pl-list"));
    }

    async function addTrackToPL(t) {
        const r = await fetch(`${API}/playlists/${tg.initDataUnsafe.user?.id || 0}`);
        const data = await r.json();
        if(data.playlists.length) {
            await fetch(`${API}/playlists/${data.playlists[0].id}/tracks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(t)
            });
            tg.showAlert("Добавлено в первый плейлист!");
        }
    }
</script>
</body>
</html>
