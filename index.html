<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>VDS Music AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #0f0f13; --surface: #1c1c24; --accent: #ff3366; --text: #ffffff; --text-muted: #9aa0a6; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #content-area { height: 100vh; overflow-y: auto; padding: 20px 20px 180px 20px; scroll-behavior: smooth; }
        .tab-view { display: none; } .tab-view.active { display: block; }
        .track-item { display: flex; align-items: center; background: var(--surface); padding: 12px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .track-thumb { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; margin-right: 14px; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,19,0.9); backdrop-filter: blur(20px); display: flex; padding: 12px 0 34px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 10px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { color: var(--accent); opacity: 1; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
        .fab { position: fixed; bottom: 110px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 90; box-shadow: 0 8px 24px rgba(255,51,102,0.4); }
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg); transition: 0.4s cubic-bezier(0.33, 1, 0.68, 1); z-index: 2000; padding: 40px 25px; }
        #full-player.open { top: 0; }
        .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .genre-card { background: var(--surface); height: 80px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; border: 1px solid rgba(255,255,255,0.05); }
        input[type=range] { width: 100%; -webkit-appearance: none; background: #333; height: 4px; border-radius: 2px; outline: none; margin: 25px 0;}
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px rgba(255,51,102,0.5); }
        #mini-player { position: fixed; bottom: 95px; left: 15px; right: 15px; background: #252530; padding: 8px 15px; border-radius: 20px; display: none; align-items: center; z-index: 80; box-shadow: 0 12px 30px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="content-area">
        <div id="tab-for-you" class="tab-view active">
            <h1 style="font-size: 28px; margin-bottom: 20px;">Для вас ✨</h1>
            <div id="for-you-results"></div>
        </div>
        <div id="tab-genres" class="tab-view">
            <h1>Жанры 🎸</h1>
            <div id="genre-grid" class="genre-grid"></div>
            <div id="genre-results" style="display:none">
                <button onclick="showGenreGrid()" style="background:var(--surface); border:none; color:white; padding:12px 20px; border-radius:12px; margin-bottom:20px; font-weight:bold;">← Назад</button>
                <div id="genre-list"></div>
            </div>
        </div>
        <div id="tab-collection" class="tab-view"><h1>Коллекция ❤️</h1><div id="collection-results"></div></div>
        <div id="tab-history" class="tab-view"><h1>История 🕒</h1><div id="history-results"></div></div>
    </div>

    <div class="fab" onclick="openSearch()">🔍</div>
    <div id="mini-player" onclick="openFullPlayer()">
        <img id="mp-thumb" class="track-thumb" style="width:40px; height:40px; margin-right:12px;">
        <div class="track-info">
            <div id="mp-title" class="track-title" style="font-size: 13px;"></div>
            <div id="mp-artist" class="track-artist" style="font-size: 10px;"></div>
        </div>
        <div onclick="event.stopPropagation(); togglePlay();" id="mp-play-btn" style="font-size:28px; color:var(--accent); padding:5px 10px;">▶</div>
    </div>

    <div id="full-player">
        <div onclick="closeFullPlayer()" style="font-size:32px; color:#555; text-align:center; margin-bottom:20px;">▾</div>
        <img id="fp-cover" style="width:100%; aspect-ratio:1/1; border-radius:24px; object-fit:cover; box-shadow: 0 20px 40px rgba(0,0,0,0.6);">
        <div style="margin-top:30px; display:flex; justify-content:space-between; align-items:center;">
            <div style="overflow:hidden; flex:1; margin-right:15px;">
                <h2 id="fp-title" style="margin:0; font-size:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></h2>
                <p id="fp-artist" style="margin:5px 0 0 0; color:var(--text-muted); font-size:16px;"></p>
            </div>
            <div id="fp-fav-btn" onclick="toggleCollectionCurrent()" style="font-size:32px;">🤍</div>
        </div>
        <input type="range" id="progress" value="0" min="0" max="100" oninput="seekAudio(this.value)">
        <div style="display:flex; justify-content:center; align-items:center; gap:45px; margin-top:10px; font-size:45px;">
            <div onclick="playPrev()">⏮</div>
            <div onclick="togglePlay()" id="fp-play-btn" style="background:var(--accent); width:80px; height:80px; border-radius:40px; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 20px rgba(255,51,102,0.3);">▶</div>
            <div onclick="playNext(true)">⏭</div>
        </div>
    </div>

    <audio id="audioA" playsinline></audio>
    <audio id="audioB" playsinline></audio>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('for-you', this)"><span class="nav-icon">✨</span>Микс</div>
        <div class="nav-item" onclick="switchTab('genres', this)"><span class="nav-icon">🎸</span>Жанры</div>
        <div class="nav-item" onclick="switchTab('collection', this)"><span class="nav-icon">❤️</span>Избранное</div>
        <div class="nav-item" onclick="switchTab('history', this)"><span class="nav-icon">🕒</span>История</div>
    </div>

    <script>
        const API = "https://surround-subpar-distort.ngrok-free.dev";
        const tg = window.Telegram.WebApp; tg.expand(); tg.setHeaderColor('#0f0f13');
        
        let audioA = document.getElementById('audioA'), audioB = document.getElementById('audioB');
        let activeAudio = audioA, nextAudio = audioB;
        let collection = JSON.parse(localStorage.getItem('vds_collection') || '[]');
        let history = JSON.parse(localStorage.getItem('vds_history') || '[]');
        let currentQueue = [], currentIndex = -1, isPreloading = false;

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'collection') renderList(collection, 'collection-results', 'collection');
            if(tab === 'history') renderList(history, 'history-results', 'history');
            if(tab === 'for-you' && !document.getElementById('for-you-results').innerHTML) loadSmartRandom();
        }

        async function loadSmartRandom() {
            const res = document.getElementById('for-you-results');
            res.innerHTML = "<p style='color:#555; text-align:center;'>🤖 ИИ подбирает музыку...</p>";
            const seeds = collection.length ? collection.slice(-5).map(t => t.title).join('||') : "";
            try {
                const r = await fetch(`${API}/smart_random?seeds=${encodeURIComponent(seeds)}`);
                const d = await r.json(); window.foryouQueue = d.tracks;
                res.innerHTML = d.tracks.map((t, i) => buildTrackHTML(t, i, 'for-you')).join('');
            } catch(e) { res.innerHTML = "Ошибка связи с ИИ."; }
        }

        const genres = ["Pop", "Hip-Hop", "Techno", "House", "Rock", "Phonk", "Lo-Fi", "Synthwave", "Indie", "Jazz"];
        function renderGenres() {
            document.getElementById('genre-grid').innerHTML = genres.map(g => `<div class="genre-card" onclick="loadGenre('${g}')">${g}</div>`).join('');
        }
        async function loadGenre(g) {
            document.getElementById('genre-grid').style.display = 'none';
            document.getElementById('genre-results').style.display = 'block';
            const list = document.getElementById('genre-list');
            list.innerHTML = "<p style='text-align:center;'>🔝 Загрузка топ-плейлиста...</p>";
            try {
                const r = await fetch(`${API}/genre?q=${g}`);
                const d = await r.json(); window.genreQueue = d.tracks;
                list.innerHTML = d.tracks.map((t, i) => buildTrackHTML(t, i, 'genre')).join('');
            } catch(e) {}
        }
        function showGenreGrid() { document.getElementById('genre-grid').style.display = 'grid'; document.getElementById('genre-results').style.display = 'none'; }

        function buildTrackHTML(t, i, ctx) {
            const isFav = collection.some(c => c.id === t.id);
            return `
            <div class="track-item" onclick="playFromContext(${i}, '${ctx}')">
                <img src="${t.thumb}" class="track-thumb">
                <div class="track-info">
                    <div class="track-title">${t.title}</div>
                    <div class="track-artist">${t.artist}</div>
                </div>
                <div onclick="event.stopPropagation(); toggleCollection(${JSON.stringify(t).replace(/"/g, '&quot;')})" style="font-size:20px; padding:10px;">${isFav?'❤️':'🤍'}</div>
            </div>`;
        }

        function playFromContext(i, ctx) {
            if(ctx === 'for-you') currentQueue = window.foryouQueue;
            if(ctx === 'genre') currentQueue = window.genreQueue;
            if(ctx === 'collection') currentQueue = collection;
            if(ctx === 'history') currentQueue = history;
            playTrack(i);
        }

        async function playTrack(i) {
            if(i < 0 || i >= currentQueue.length) return;
            currentIndex = i; const t = currentQueue[i];
            
            document.getElementById('mini-player').style.display = 'flex';
            document.getElementById('mp-title').innerText = t.title;
            document.getElementById('mp-artist').innerText = t.artist;
            document.getElementById('mp-thumb').src = t.thumb;
            document.getElementById('fp-title').innerText = t.title;
            document.getElementById('fp-artist').innerText = t.artist;
            document.getElementById('fp-cover').src = t.thumb;
            document.getElementById('fp-fav-btn').innerText = collection.some(c => c.id === t.id) ? '❤️' : '🤍';
            
            setupMediaSession(t);
            updateHistory(t);

            activeAudio.pause();
            try {
                const r = await fetch(`${API}/stream/${t.id}?url=${encodeURIComponent(t.yt_url)}`);
                if(r.status === 404) { playNext(false); return; }
                const blob = await r.blob();
                activeAudio.src = URL.createObjectURL(blob);
                activeAudio.play();
                updatePlayUI(true);
            } catch(e) {}
        }

        function updateHistory(t) {
            history = history.filter(h => h.id !== t.id);
            history.unshift(t); if(history.length > 50) history.pop();
            localStorage.setItem('vds_history', JSON.stringify(history));
        }

        function toggleCollection(t) {
            const idx = collection.findIndex(c => c.id === t.id);
            if(idx > -1) collection.splice(idx, 1); else collection.push(t);
            localStorage.setItem('vds_collection', JSON.stringify(collection));
            if(currentIndex > -1 && currentQueue[currentIndex].id === t.id) 
                document.getElementById('fp-fav-btn').innerText = idx > -1 ? '🤍' : '❤️';
            // Перерисовать текущую вкладку если нужно
        }

        function setupMediaSession(t) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.title, artist: t.artist,
                    artwork: [{ src: t.thumb, sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', playPrev);
                navigator.mediaSession.setActionHandler('nexttrack', () => playNext(true));
            }
        }

        function playNext(manual) { playTrack(currentIndex + 1); }
        function playPrev() { playTrack(currentIndex - 1); }
        function togglePlay() { 
            if(activeAudio.paused) { activeAudio.play(); updatePlayUI(true); } 
            else { activeAudio.pause(); updatePlayUI(false); }
        }
        function updatePlayUI(p) { 
            document.getElementById('mp-play-btn').innerText = p ? '⏸' : '▶'; 
            document.getElementById('fp-play-btn').innerText = p ? '⏸' : '▶';
        }
        function seekAudio(v) { activeAudio.currentTime = (v / 100) * activeAudio.duration; }
        activeAudio.ontimeupdate = () => {
            if(activeAudio.duration) document.getElementById('progress').value = (activeAudio.currentTime / activeAudio.duration) * 100;
        };
        activeAudio.onended = () => playNext(false);

        function openFullPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('open'); }
        function renderList(list, id, ctx) { document.getElementById(id).innerHTML = list.map((t, i) => buildTrackHTML(t, i, ctx)).join(''); }

        renderGenres(); switchTab('for-you', document.querySelector('.nav-item'));
    </script>
</body>
</html>
