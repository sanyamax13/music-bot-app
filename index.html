<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Vibe Player Debug v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #FFCC00; --bg: #0b0b0b; --card: #161616; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-bottom: 180px; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; font-size: 16px; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; }
        .track-card { background: var(--card); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #333; padding: 20px; box-sizing: border-box; display: none; z-index: 1000; }
        audio { width: 100%; filter: invert(100%) brightness(1.5); }
        #debug-window { background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 8px; border: 1px solid #333; margin-top: 20px; height: 120px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="search-row">
        <input id="q" type="text" placeholder="Введите название..." onkeydown="if(event.key==='Enter')search()">
        <button class="btn" onclick="search()">Найти</button>
    </div>

    <div id="results"></div>

    <div id="debug-window">Система: Готов к работе</div>

    <div id="player-bar">
        <div id="now-playing" style="font-size: 13px; margin-bottom: 10px; color: var(--accent); font-weight: bold;"></div>
        <audio id="audio" controls autoplay playsinline></audio>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API = "https://surround-subpar-distort.ngrok-free.dev";

        function addLog(msg) {
            const l = document.getElementById('debug-window');
            l.innerText += "\n> " + msg;
            l.scrollTop = l.scrollHeight;
            console.log(msg);
        }

        async function search() {
            const q = document.getElementById('q').value;
            if(!q) return;
            addLog("Поиск: " + q);
            document.getElementById('results').innerHTML = "⏳ Загрузка...";
            try {
                const response = await fetch(`${API}/search?q=${encodeURIComponent(q)}`, {
                    headers: { "ngrok-skip-browser-warning": "69420" }
                });
                const data = await response.json();
                addLog("Найдено: " + (data.tracks ? data.tracks.length : 0));
                let html = '';
                data.tracks.forEach(t => {
                    html += `
                    <div class="track-card" onclick="play('${t.id}', '${encodeURIComponent(t.yt_url)}', '${t.title.replace(/'/g, "")}')">
                        <div><b>${t.title}</b><br><small style="color:#888">${t.artist}</small></div>
                        <div style="color:var(--accent)">▶</div>
                    </div>`;
                });
                document.getElementById('results').innerHTML = html;
            } catch (e) {
                addLog("ОШИБКА ПОИСКА: " + e.message);
            }
        }

        function play(id, url, title) {
            const playerBar = document.getElementById('player-bar');
            const audio = document.getElementById('audio');
            const streamUrl = `${API}/stream/${id}?url=${url}`;
            
            addLog("Запуск: " + title);
            addLog("URL: " + streamUrl);
            
            playerBar.style.display = 'block';
            document.getElementById('now-playing').innerText = "🎶 " + title;
            
            audio.src = streamUrl;
            audio.load(); // Важно для iOS
            
            audio.play()
                .then(() => addLog("✅ Воспроизведение..."))
                .catch(e => addLog("❌ Safari блок: " + e.name));

            audio.onerror = () => addLog("❌ Ошибка аудио. Код: " + audio.error.code);
        }
    </script>
</body>
</html>
