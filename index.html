<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VDS Player</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0e0e0e;
    --bg2:     #1a1a1a;
    --bg3:     #252525;
    --accent:  #FFCC00;
    --text:    #f0f0f0;
    --muted:   #888;
    --radius:  12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid #333;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 4px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Screens ── */
  .screen { display: none; flex: 1; flex-direction: column; padding: 12px; padding-bottom: 110px; }
  .screen.active { display: flex; }

  /* ── Search ── */
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-row input {
    flex: 1; padding: 12px 14px; border-radius: var(--radius);
    border: 1px solid #333; background: var(--bg2);
    color: var(--text); font-size: 15px; outline: none;
  }
  .search-row input:focus { border-color: var(--accent); }
  .btn {
    padding: 12px 18px; border-radius: var(--radius); border: none;
    background: var(--accent); color: #000; font-size: 14px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .btn-sm {
    padding: 6px 12px; border-radius: 8px; border: none;
    background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer;
  }
  .btn-sm.danger { background: #3a1010; color: #f88; }

  /* ── Track list ── */
  .track-list { display: flex; flex-direction: column; gap: 6px; }
  .track-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-radius: var(--radius);
    padding: 10px; cursor: pointer;
    border: 1px solid transparent; transition: border-color .15s;
  }
  .track-item:active { border-color: var(--accent); }
  .track-item.playing { border-color: var(--accent); }
  .track-thumb {
    width: 48px; height: 48px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0; background: var(--bg3);
  }
  .track-info { flex: 1; min-width: 0; }
  .track-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .track-dur { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .track-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ── Genre chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .chip {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #444;
    background: var(--bg2); color: var(--muted); font-size: 13px;
    cursor: pointer; transition: all .15s;
  }
  .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── Player bar ── */
  #player-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2); border-top: 1px solid #333;
    padding: 10px 14px 20px;
    z-index: 100;
  }
  .player-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #pb-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
  #pb-title { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #pb-artist { font-size: 12px; color: var(--muted); }
  .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 8px; }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--bg3); color: var(--text); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #pb-play-btn {
    width: 46px; height: 46px; font-size: 20px;
    background: var(--accent); color: #000;
  }
  .progress-row { display: flex; align-items: center; gap: 8px; }
  #pb-progress {
    flex: 1; height: 4px; border-radius: 2px; cursor: pointer;
    accent-color: var(--accent);
  }
  .time-label { font-size: 11px; color: var(--muted); min-width: 34px; }
  #time-end { text-align: right; }

  /* ── Playlist screen ── */
  .pl-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .pl-header input { flex: 1; padding: 10px 14px; border-radius: var(--radius); border: 1px solid #333; background: var(--bg2); color: var(--text); font-size: 14px; outline: none; }
  .pl-card {
    background: var(--bg2); border-radius: var(--radius); padding: 12px;
    margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .pl-card:active { opacity: .7; }
  .pl-name { font-size: 15px; font-weight: 500; }
  .pl-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .back-btn { background: none; border: none; color: var(--accent); font-size: 14px; cursor: pointer; margin-bottom: 10px; }

  /* ── Loader ── */
  .spinner { width: 24px; height: 24px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; color: var(--muted); font-size: 14px; margin-top: 30px; }
</style>
</head>
<body>

<!-- Tabs -->
<nav class="tabs">
  <button class="tab-btn active" onclick="showTab('search')">Поиск</button>
  <button class="tab-btn" onclick="showTab('genres')">Жанры</button>
  <button class="tab-btn" onclick="showTab('playlists')">Плейлисты</button>
</nav>

<!-- Search screen -->
<div id="tab-search" class="screen active">
  <div class="search-row">
    <input id="search-input" type="text" placeholder="Название, исполнитель..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn" onclick="doSearch()">Найти</button>
  </div>
  <div id="search-results" class="track-list"></div>
</div>

<!-- Genres screen -->
<div id="tab-genres" class="screen">
  <div class="chips" id="genre-chips"></div>
  <div id="genre-results" class="track-list"></div>
</div>

<!-- Playlists screen -->
<div id="tab-playlists" class="screen">
  <div id="pl-list-view">
    <div class="pl-header">
      <input id="new-pl-name" placeholder="Название плейлиста...">
      <button class="btn" onclick="createPlaylist()">+</button>
    </div>
    <div id="pl-cards"></div>
  </div>
  <div id="pl-detail-view" style="display:none">
    <button class="back-btn" onclick="backToPlaylists()">← Назад</button>
    <div id="pl-detail-title" style="font-size:17px;font-weight:600;margin-bottom:12px"></div>
    <div id="pl-tracks" class="track-list"></div>
  </div>
</div>

<!-- Player bar -->
<div id="player-bar">
  <div class="player-top">
    <img id="pb-thumb" src="" alt="">
    <div style="flex:1;min-width:0">
      <div id="pb-title" style="color:var(--muted)">Ничего не играет</div>
      <div id="pb-artist"></div>
    </div>
    <button class="btn-sm" onclick="downloadCurrent()">⬇</button>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
    <button class="ctrl-btn" id="pb-play-btn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
  </div>
  <div class="progress-row">
    <span class="time-label" id="time-cur">0:00</span>
    <input type="range" id="pb-progress" min="0" max="100" value="0" oninput="seekTo(this.value)">
    <span class="time-label" id="time-end">0:00</span>
  </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API = "http://72.56.96.49:8000";   // ← замени на адрес твоего VDS

// ─── STATE ────────────────────────────────────────────────────────────────────
const tg       = window.Telegram.WebApp;
const USER_ID  = tg.initDataUnsafe?.user?.id || 0;
let queue      = [];   // текущая очередь треков
let queueIndex = 0;
let currentPl  = null;

tg.expand();
tg.setHeaderColor("#0e0e0e");

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  event.currentTarget.classList.add("active");
  if (name === "genres" && !document.getElementById("genre-chips").children.length) initGenres();
  if (name === "playlists") loadPlaylists();
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return;
  const el = document.getElementById("search-results");
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    queue = data.tracks;
    queueIndex = 0;
    renderTrackList(el, data.tracks, (i) => playTrack(i, data.tracks));
  } catch {
    el.innerHTML = '<div class="empty">Ошибка сети</div>';
  }
}

// ─── GENRES ───────────────────────────────────────────────────────────────────
const GENRES = [
  { name: "Хиты", query: "top hits 2024" },
  { name: "Hip-Hop", query: "hip hop best 2024" },
  { name: "Рок", query: "rock classics" },
  { name: "Поп", query: "pop hits" },
  { name: "Электронная", query: "electronic dance music" },
  { name: "Джаз", query: "jazz lounge" },
  { name: "Классика", query: "classical music best" },
  { name: "Lo-fi", query: "lofi hip hop chill" },
  { name: "Метал", query: "metal best songs" },
  { name: "R&B", query: "rnb soul best" },
];

function initGenres() {
  const chips = document.getElementById("genre-chips");
  chips.innerHTML = "";
  GENRES.forEach((g, i) => {
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.textContent = g.name;
    chip.onclick = () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      searchGenre(g.query);
    };
    chips.appendChild(chip);
  });
}

async function searchGenre(query) {
  const el = document.getElementById("genre-results");
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(`${API}/search?q=${encodeURIComponent(query)}&limit=12`);
    const data = await r.json();
    queue = data.tracks;
    queueIndex = 0;
    renderTrackList(el, data.tracks, (i) => playTrack(i, data.tracks));
  } catch {
    el.innerHTML = '<div class="empty">Ошибка</div>';
  }
}

// ─── RENDER TRACK LIST ────────────────────────────────────────────────────────
function renderTrackList(container, tracks, onPlay) {
  if (!tracks || !tracks.length) {
    container.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }
  container.innerHTML = "";
  tracks.forEach((t, i) => {
    const item = document.createElement("div");
    item.className = "track-item";
    item.id = "track-item-" + t.id;
    item.innerHTML = `
      <img class="track-thumb" src="${t.thumbnail || ""}" loading="lazy" onerror="this.style.visibility='hidden'">
      <div class="track-info">
        <div class="track-title">${esc(t.title)}</div>
        <div class="track-artist">${esc(t.artist || "")}</div>
      </div>
      <span class="track-dur">${fmtDur(t.duration)}</span>
      <div class="track-actions">
        <button class="btn-sm" onclick="event.stopPropagation();addToPlaylistDialog(${JSON.stringify(t).replace(/"/g,'&quot;')})">+PL</button>
      </div>
    `;
    item.onclick = () => onPlay(i);
    container.appendChild(item);
  });
}

// ─── AUDIO PLAYER ─────────────────────────────────────────────────────────────
const audio = document.getElementById("audio");

function playTrack(index, list) {
  if (list) { queue = list; queueIndex = index; }
  else       { queueIndex = index; }
  const t = queue[queueIndex];
  if (!t) return;

  // Highlight
  document.querySelectorAll(".track-item").forEach(el => el.classList.remove("playing"));
  const el = document.getElementById("track-item-" + t.id);
  if (el) el.classList.add("playing");

  // Update player bar
  document.getElementById("pb-title").textContent  = t.title;
  document.getElementById("pb-artist").textContent = t.artist || "";
  document.getElementById("pb-thumb").src          = t.thumbnail || "";

  // Stream URL через наш FastAPI
  const streamUrl = `${API}/stream/${t.id}?url=${encodeURIComponent(t.yt_url)}`;
  audio.src = streamUrl;
  audio.play().catch(() => {});
  document.getElementById("pb-play-btn").textContent = "⏸";

  // MediaSession API (шторка телефона)
  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  t.title,
      artist: t.artist || "",
      artwork: t.thumbnail ? [{ src: t.thumbnail, sizes: "320x180", type: "image/jpeg" }] : [],
    });
    navigator.mediaSession.setActionHandler("play",     () => { audio.play(); });
    navigator.mediaSession.setActionHandler("pause",    () => { audio.pause(); });
    navigator.mediaSession.setActionHandler("previoustrack", prevTrack);
    navigator.mediaSession.setActionHandler("nexttrack",     nextTrack);
  }
}

function togglePlay() {
  if (!audio.src) return;
  if (audio.paused) { audio.play(); document.getElementById("pb-play-btn").textContent = "⏸"; }
  else              { audio.pause(); document.getElementById("pb-play-btn").textContent = "▶"; }
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (queueIndex > 0) playTrack(queueIndex - 1);
}
function nextTrack() {
  if (queueIndex < queue.length - 1) playTrack(queueIndex + 1);
}

audio.addEventListener("ended", nextTrack);

audio.addEventListener("timeupdate", () => {
  const cur = audio.currentTime, dur = audio.duration || 0;
  document.getElementById("time-cur").textContent = fmtDur(cur);
  document.getElementById("time-end").textContent = fmtDur(dur);
  document.getElementById("pb-progress").value = dur ? (cur / dur * 100) : 0;
});

function seekTo(pct) {
  if (audio.duration) audio.currentTime = audio.duration * pct / 100;
}

// ─── DOWNLOAD ─────────────────────────────────────────────────────────────────
function downloadCurrent() {
  const t = queue[queueIndex];
  if (!t) return;
  tg.sendData(JSON.stringify({ action: "download", url: t.yt_url, title: t.title }));
}

// ─── PLAYLISTS ────────────────────────────────────────────────────────────────
async function loadPlaylists() {
  if (!USER_ID) return;
  const el = document.getElementById("pl-cards");
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(`${API}/playlists/${USER_ID}`);
    const data = await r.json();
    el.innerHTML = "";
    if (!data.playlists.length) {
      el.innerHTML = '<div class="empty">Нет плейлистов</div>';
      return;
    }
    data.playlists.forEach(pl => {
      const card = document.createElement("div");
      card.className = "pl-card";
      card.innerHTML = `
        <div>
          <div class="pl-name">${esc(pl.name)}</div>
          <div class="pl-meta">${pl.created?.slice(0,10) || ""}</div>
        </div>
        <button class="btn-sm" onclick="event.stopPropagation();deletePlaylist(${pl.id})">✕</button>
      `;
      card.onclick = () => openPlaylist(pl);
      el.appendChild(card);
    });
  } catch {
    el.innerHTML = '<div class="empty">Ошибка</div>';
  }
}

async function createPlaylist() {
  const nameEl = document.getElementById("new-pl-name");
  const name = nameEl.value.trim();
  if (!name || !USER_ID) return;
  await fetch(`${API}/playlists`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: USER_ID, name }),
  });
  nameEl.value = "";
  loadPlaylists();
}

async function deletePlaylist(id) {
  // SQLite каскадно удалит треки
  await fetch(`${API}/playlists/${id}`, { method: "DELETE" }).catch(() => {});
  loadPlaylists();
}

async function openPlaylist(pl) {
  currentPl = pl;
  document.getElementById("pl-list-view").style.display = "none";
  document.getElementById("pl-detail-view").style.display = "block";
  document.getElementById("pl-detail-title").textContent = pl.name;
  const el = document.getElementById("pl-tracks");
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(`${API}/playlists/${pl.id}/tracks`);
    const data = await r.json();
    const tracks = data.tracks.map(t => ({
      id: t.track_id, yt_url: "", // yt_url не сохраняем — нужен повторный поиск
      title: t.title, artist: t.artist,
      thumbnail: t.thumbnail, duration: t.duration,
    }));
    renderTrackList(el, tracks, (i) => playTrack(i, tracks));
    // Добавляем кнопку удаления из плейлиста
    data.tracks.forEach((t, i) => {
      const item = document.getElementById("track-item-" + t.track_id);
      if (item) {
        const btn = document.createElement("button");
        btn.className = "btn-sm danger";
        btn.textContent = "✕";
        btn.onclick = (e) => { e.stopPropagation(); removeFromPlaylist(pl.id, t.track_id, item); };
        item.querySelector(".track-actions").appendChild(btn);
      }
    });
  } catch {
    el.innerHTML = '<div class="empty">Ошибка</div>';
  }
}

function backToPlaylists() {
  currentPl = null;
  document.getElementById("pl-list-view").style.display = "block";
  document.getElementById("pl-detail-view").style.display = "none";
}

// ─── ADD TO PLAYLIST DIALOG ───────────────────────────────────────────────────
async function addToPlaylistDialog(track) {
  if (!USER_ID) { tg.showAlert("Пользователь не авторизован"); return; }
  const r = await fetch(`${API}/playlists/${USER_ID}`);
  const data = await r.json();
  const pls = data.playlists;
  if (!pls.length) { tg.showAlert("Сначала создай плейлист на вкладке Плейлисты"); return; }
  tg.showPopup({
    title: "Добавить в плейлист",
    message: "Выбери плейлист:",
    buttons: [
      ...pls.slice(0, 3).map(pl => ({ id: String(pl.id), type: "default", text: pl.name })),
      { id: "cancel", type: "cancel", text: "Отмена" },
    ],
  }, async (btn_id) => {
    if (btn_id === "cancel" || !btn_id) return;
    await fetch(`${API}/playlists/${btn_id}/tracks`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        track_id: track.id, title: track.title,
        artist: track.artist, thumbnail: track.thumbnail,
        duration: track.duration,
      }),
    });
    tg.showAlert("Добавлено!");
  });
}

async function removeFromPlaylist(plId, trackId, el) {
  await fetch(`${API}/playlists/${plId}/tracks/${trackId}`, { method: "DELETE" });
  el.remove();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmtDur(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
