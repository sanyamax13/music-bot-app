<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>VDS Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0f0f13;
            --surface: #1c1c24;
            --surface-2: #252530;
            --accent: #ff3366;
            --text: #ffffff;
            --text-muted: #9aa0a6;
            --radius: 16px;
        }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        #content-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            padding: 24px 18px 200px;
            scroll-behavior: smooth;
        }
        .tab-view { display: none; }
        .tab-view.active { display: block; }
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 18px; letter-spacing: -0.5px; }
        h2 { font-size: 18px; font-weight: 700; margin: 22px 0 12px; }

        /* Track item */
        .track-item {
            display: flex; align-items: center;
            background: var(--surface);
            padding: 10px 12px;
            border-radius: var(--radius);
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s, transform 0.15s;
        }
        .track-item:active { transform: scale(0.98); background: var(--surface-2); }
        .track-thumb {
            width: 52px; height: 52px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 14px;
            background: #2a2a34;
            flex-shrink: 0;
        }
        .track-info { flex: 1; min-width: 0; cursor: pointer; }
        .track-title {
            font-weight: 600; font-size: 14px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 12px; color: var(--text-muted); margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .source-icon { font-size: 11px; margin-right: 4px; opacity: 0.8; }
        .track-actions { display: flex; align-items: center; gap: 4px; }
        .icon-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; border-radius: 50%;
            cursor: pointer; transition: background 0.2s;
        }
        .icon-btn:active { background: rgba(255,255,255,0.08); }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15,15,19,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            padding: 10px 0 calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255,255,255,0.06);
            z-index: 1000;
        }
        .nav-item {
            flex: 1; text-align: center;
            color: var(--text-muted);
            font-size: 10px; font-weight: 500;
            cursor: pointer; opacity: 0.7;
            transition: 0.25s;
        }
        .nav-item.active { color: var(--accent); opacity: 1; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 3px; }

        /* Mood carousel */
        .mood-scroll {
            display: flex; gap: 10px;
            overflow-x: auto;
            margin: 0 -18px 20px;
            padding: 4px 18px 12px;
            scrollbar-width: none;
        }
        .mood-scroll::-webkit-scrollbar { display: none; }
        .mood-card {
            flex-shrink: 0;
            padding: 12px 18px;
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 13px; font-weight: 600;
            white-space: nowrap;
            transition: 0.25s;
            cursor: pointer;
        }
        .mood-card.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 6px 18px rgba(255,51,102,0.35);
        }
        .mood-emoji { font-size: 18px; margin-right: 6px; }

        /* Search */
        .search-input {
            width: 100%; padding: 14px 16px;
            border-radius: 14px; border: none;
            background: var(--surface);
            color: white; font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .chip-row {
            display: flex; gap: 8px;
            overflow-x: auto;
            margin: 14px -18px;
            padding: 2px 18px 8px;
            scrollbar-width: none;
        }
        .chip-row::-webkit-scrollbar { display: none; }
        .chip {
            flex-shrink: 0;
            padding: 8px 14px;
            background: var(--surface);
            border-radius: 20px;
            font-size: 12px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Genre grid */
        .genre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .genre-card {
            height: 100px;
            border-radius: 18px;
            padding: 14px;
            display: flex; flex-direction: column;
            justify-content: space-between;
            font-weight: 800; font-size: 15px;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform 0.2s;
        }
        .genre-card:active { transform: scale(0.96); }
        .genre-card .g-emoji { font-size: 28px; }
        .genre-card .g-name { text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
        .back-btn {
            background: var(--surface); border: none; color: white;
            padding: 10px 16px; border-radius: 12px;
            margin-bottom: 16px; font-weight: 600; font-size: 13px;
            cursor: pointer; font-family: inherit;
        }

        /* Profile */
        .profile-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 14px;
        }
        .taste-row { margin-bottom: 12px; }
        .taste-label {
            display: flex; justify-content: space-between;
            font-size: 13px; margin-bottom: 6px;
        }
        .taste-bar {
            height: 8px; background: #2a2a34;
            border-radius: 4px; overflow: hidden;
        }
        .taste-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff6699);
            border-radius: 4px;
            transition: width 0.6s;
        }
        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-box {
            background: var(--surface);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .btn-danger {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 14px; border-radius: 12px;
            font-weight: 600; font-size: 14px;
            margin-top: 16px; cursor: pointer;
            font-family: inherit;
        }

        /* FAB — removed (dedicated Search tab exists) */

        /* Mini player */
        #mini-player {
            position: fixed;
            bottom: calc(90px + env(safe-area-inset-bottom));
            left: 12px; right: 12px;
            background: var(--surface-2);
            padding: 8px 12px;
            border-radius: 16px;
            display: none;
            align-items: center;
            z-index: 80;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }
        #mp-thumb {
            width: 42px; height: 42px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 12px;
        }
        .mp-info { flex: 1; min-width: 0; }
        #mp-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #mp-artist { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #mp-play-btn {
            font-size: 26px; color: var(--accent);
            padding: 6px 10px;
            cursor: pointer;
        }

        /* Full player */
        #full-player {
            position: fixed;
            top: 100%; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            transition: top 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 2000;
            padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
            display: flex; flex-direction: column;
            overflow-y: auto;
        }
        #full-player.open { top: 0; }
        .fp-handle {
            font-size: 28px; color: #555;
            text-align: center; margin-bottom: 8px;
            cursor: pointer;
        }
        #fp-cover {
            width: 60vw;
            max-width: 280px;
            aspect-ratio: 1/1;
            margin: 0 auto;
            border-radius: 24px;
            object-fit: cover;
            background: var(--surface);
            box-shadow: 0 24px 48px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        .fp-meta {
            margin-top: 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .fp-meta .track-info { flex: 1; }
        #fp-title { font-size: 22px; font-weight: 800; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #fp-artist { font-size: 15px; color: var(--text-muted); margin: 4px 0 0; }
        .fp-progress-wrap { margin-top: 14px; }
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
            height: 20px;
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px; background: #333; border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: var(--accent);
            border-radius: 50%;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(255,51,102,0.6);
        }
        .fp-time {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--text-muted);
            margin-top: 2px;
        }
        .fp-controls {
            display: flex; justify-content: center; align-items: center;
            gap: 28px; margin-top: 16px;
            font-size: 38px;
        }
        .fp-controls div { cursor: pointer; user-select: none; }
        #fp-play-btn {
            background: var(--accent);
            width: 72px; height: 72px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            box-shadow: 0 12px 24px rgba(255,51,102,0.4);
        }
        .fp-feedback {
            display: flex; justify-content: center;
            gap: 40px; margin-top: 14px;
            font-size: 28px;
        }
        .fp-feedback div { cursor: pointer; padding: 6px 12px; }
        .fp-volume {
            display: flex; align-items: center; gap: 10px;
            margin-top: 10px; padding: 0 8px;
        }
        .fp-volume .vol-icon { font-size: 18px; cursor: pointer; user-select: none; min-width: 24px; text-align: center; }
        .fp-volume input[type=range] { flex: 1; height: 16px; }
        .fp-volume input[type=range]::-webkit-slider-runnable-track { height: 3px; background: #444; }
        .fp-volume input[type=range]::-webkit-slider-thumb { width: 12px; height: 12px; margin-top: -4.5px; }

        /* Search overlay — removed (dedicated Search tab exists) */

        .empty { text-align: center; color: #555; margin-top: 60px; font-size: 14px; }
        .loading { text-align: center; color: var(--text-muted); margin-top: 30px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="content-area">
        <!-- Wave -->
        <div id="tab-wave" class="tab-view active">
            <h1>Волна 🌊</h1>
            <div class="mood-scroll" id="mood-scroll"></div>
            <div id="wave-list"></div>
            <div id="wave-loader" class="loading" style="display:none;">Загружаем поток…</div>
        </div>

        <!-- Search -->
        <div id="tab-search" class="tab-view">
            <h1>Поиск 🔍</h1>
            <input id="search-tab-input" class="search-input" placeholder="Трек, артист, альбом…">
            <div class="chip-row" id="source-chips"></div>
            <div id="search-tab-results">
                <p class="empty">Начните вводить запрос</p>
            </div>
        </div>

        <!-- Genres -->
        <div id="tab-genres" class="tab-view">
            <h1>Жанры 🎸</h1>
            <div id="genre-grid" class="genre-grid"></div>
            <div id="genre-results" style="display:none;">
                <button class="back-btn">← Назад</button>
                <h2 id="genre-results-title" style="margin-top:0;"></h2>
                <div id="genre-list"></div>
            </div>
        </div>

        <!-- Collection -->
        <div id="tab-collection" class="tab-view">
            <h1>Коллекция ❤️</h1>
            <div id="collection-results">
                <p class="loading">Загружаем лайки…</p>
            </div>
        </div>

        <!-- Profile -->
        <div id="tab-profile" class="tab-view">
            <h1>Профиль 👤</h1>
            <div class="profile-card">
                <h2 style="margin-top:0;">Ваш вкус</h2>
                <div id="taste-bars">
                    <p class="loading">Анализируем…</p>
                </div>
            </div>
            <h2>Статистика</h2>
            <div class="stat-grid" id="stat-grid"></div>
            <button class="btn-danger">Сбросить предпочтения</button>
        </div>
    </div>

    <div id="mini-player">
        <img id="mp-thumb">
        <div class="mp-info">
            <div id="mp-title"></div>
            <div id="mp-artist"></div>
        </div>
        <div id="mp-play-btn">▶</div>
    </div>

    <div id="full-player">
        <!-- Content injected by FullscreenPlayer.renderTrack(); this static markup is replaced on mount -->
    </div>
    <div id="queue-panel" style="display:none"></div>

    <audio id="audioA" playsinline preload="auto"></audio>
    <audio id="audioB" playsinline preload="auto"></audio>

    <div class="bottom-nav">
        <div class="nav-item active" data-tab="wave"><span class="nav-icon">🌊</span>Волна</div>
        <div class="nav-item" data-tab="search"><span class="nav-icon">🔍</span>Поиск</div>
        <div class="nav-item" data-tab="genres"><span class="nav-icon">🎸</span>Жанры</div>
        <div class="nav-item" data-tab="collection"><span class="nav-icon">❤️</span>Коллекция</div>
        <div class="nav-item" data-tab="profile"><span class="nav-icon">👤</span>Профиль</div>
    </div>


    <script>
        // =====================================================================
        // VDS Music — single-file modular layout (Phase 1 refactor)
        // Sections must appear in this order — every module below Store may
        // reference Store; PlaybackEngine must be defined before any component.
        // See .planning/research/ARCHITECTURE.md §1.
        // =====================================================================

        // ===== CONFIG =====
        const Config = (() => {
            const API = "https://api.vdsmusic.ru:8443";
            const SOURCES = [
                { id: 'all', name: 'Всё' },
                { id: 'library', name: 'Библиотека' },
                { id: 'youtube', name: 'YouTube' },
                { id: 'soundcloud', name: 'SoundCloud' },
                { id: 'jamendo', name: 'Jamendo' },
            ];
            const SOURCE_ICONS = {
                local: '🎵', library: '🎵',
                youtube: '▶️',
                soundcloud: '☁️',
                jamendo: '🎶',
            };
            const GENRES = [
                { name: 'Pop',           emoji: '🎤', grad: 'linear-gradient(135deg, #ff6b9d, #c44569)' },
                { name: 'Rock',          emoji: '🎸', grad: 'linear-gradient(135deg, #ee5a6f, #7d2d34)' },
                { name: 'Hip-Hop',       emoji: '🎧', grad: 'linear-gradient(135deg, #ffa502, #ff6348)' },
                { name: 'Electronic',    emoji: '🎛️', grad: 'linear-gradient(135deg, #00d2ff, #3a47d5)' },
                { name: 'Jazz',          emoji: '🎷', grad: 'linear-gradient(135deg, #b65f29, #5d2e0d)' },
                { name: 'Classical',     emoji: '🎻', grad: 'linear-gradient(135deg, #667eea, #2c3e6c)' },
                { name: 'R&B',           emoji: '💫', grad: 'linear-gradient(135deg, #8e44ad, #3a1c5c)' },
                { name: 'Metal',         emoji: '🤘', grad: 'linear-gradient(135deg, #424242, #000)' },
                { name: 'Indie',         emoji: '🌿', grad: 'linear-gradient(135deg, #56ab2f, #1e4620)' },
                { name: 'Lo-fi',         emoji: '🌙', grad: 'linear-gradient(135deg, #485563, #29323c)' },
                { name: 'K-Pop',         emoji: '💖', grad: 'linear-gradient(135deg, #f093fb, #c94b9e)' },
                { name: 'Reggaeton',     emoji: '🔥', grad: 'linear-gradient(135deg, #ff9966, #ff2e1f)' },
                { name: 'Ambient',       emoji: '🌌', grad: 'linear-gradient(135deg, #5ee7df, #2a5470)' },
                { name: 'House',         emoji: '🏠', grad: 'linear-gradient(135deg, #4facfe, #003a7a)' },
                { name: 'Drum & Bass',   emoji: '🥁', grad: 'linear-gradient(135deg, #f78ca0, #8d3741)' },
                { name: 'Русский рэп',   emoji: '🇷🇺', grad: 'linear-gradient(135deg, #d6336c, #5a0f2e)' },
                { name: 'Русский рок',   emoji: '⚡', grad: 'linear-gradient(135deg, #c0392b, #4a1410)' },
                { name: 'Шансон',        emoji: '🎭', grad: 'linear-gradient(135deg, #8b6914, #3d2a05)' },
            ];
            return { API, SOURCES, SOURCE_ICONS, GENRES };
        })();

        // ===== UTILS =====
        const Utils = (() => {
            function fmtTime(s) {
                if (!s || !isFinite(s)) return '0:00';
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return `${m}:${sec < 10 ? '0' : ''}${sec}`;
            }
            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
            }
            function escapeAttr(s) { return String(s).replace(/'/g, "\\'"); }
            return { fmtTime, escapeHtml, escapeAttr };
        })();

        // ===== TELEGRAM =====
        const Tg = (() => {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.setHeaderColor('#0f0f13');
            const USER_ID = (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || 0;
            return { tg, USER_ID };
        })();

        // ===== STORE =====
        // Single source of truth for app state. See ARCHITECTURE.md §2.
        // Exactly one module owns each key (enforced by convention — see owner comments).
        const Store = (() => {
          const state = {
            // ===== Playback (owner: PlaybackEngine — Plan 04) =====
            currentTrack: null,
            isPlaying: false,
            duration: 0,
            playbackCtx: 'wave',           // 'wave' | 'genre' | 'search-tab' | 'collection'

            // ===== Queue (owner: PlaybackEngine — Plan 04) =====
            queue: [],
            queueIndex: -1,
            userQueue: [],                 // explicit "play next" — wired in Phase 6
            history: [],                   // for prev — wired in Phase 6

            // ===== Wave-specific (owner: HomeScreen — Plan 07; read by PlaybackEngine for auto-extend) =====
            waveMood: '',
            waveLoading: false,
            waveEnded: false,

            // ===== UI (owner: Router — Plan 05) =====
            screen: 'wave',                // 'wave' | 'search' | 'genres' | 'collection' | 'profile'
            fullscreenOpen: false,
            queuePanelOpen: false,         // Phase 6 will use this

            // ===== Search (owner: SearchScreen — Plan 07) =====
            activeSource: 'all',

            searchTabResults: [],

            // ===== Genre (owner: HomeScreen/GenreScreen — Plan 07) =====
            genreResults: [],

            // ===== Collection (owner: LibraryScreen — Plan 07) =====
            collectionResults: [],

            // ===== Per-user (owner: Boot/Api — Plan 08) =====
            userId: 0,
            likedIds: new Set(),
            taste: null,
            stats: null,
          };

          const subs = new Map();          // key -> Set<fn>

          function get(key) { return state[key]; }

          function set(patch) {
            const changedKeys = [];
            for (const k of Object.keys(patch)) {
              if (state[k] !== patch[k]) {
                state[k] = patch[k];
                changedKeys.push(k);
              }
            }
            if (changedKeys.length) notify(changedKeys);
          }

          function subscribe(keys, fn) {
            for (const k of keys) {
              if (!subs.has(k)) subs.set(k, new Set());
              subs.get(k).add(fn);
            }
            // return an unsubscribe function
            return () => { for (const k of keys) subs.get(k)?.delete(fn); };
          }

          function notify(changedKeys) {
            const called = new Set();
            for (const k of changedKeys) {
              const set = subs.get(k);
              if (!set) continue;
              for (const fn of set) {
                if (called.has(fn)) continue;
                called.add(fn);
                try { fn(state); } catch (e) { console.error('[Store] subscriber error', e); }
              }
            }
          }

          return { get, set, subscribe, _state: state };  // _state exposed only for debugging
        })();

        // ===== API =====
        // Single bridge between frontend and https://api.vdsmusic.ru:8443.
        // See ARCHITECTURE.md §6. Methods map 1:1 to backend endpoints.
        // Dedup: identical in-flight requests share one Promise.
        // Error envelope: non-2xx responses throw Error with HTTP status.
        // Retry/backoff is intentionally NOT here (Phase 2 / AUDIO-6).
        const Api = (() => {
          const base = Config.API;
          const inflight = new Map();

          function key(method, path, body) {
            return `${method} ${path} ${body ? JSON.stringify(body) : ''}`;
          }

          async function req(path, opts = {}) {
            const method = opts.method || 'GET';
            const k = key(method, path, opts.body);
            if (inflight.has(k)) return inflight.get(k);
            const p = (async () => {
              const r = await fetch(base + path, {
                method,
                headers: opts.body ? { 'Content-Type': 'application/json' } : undefined,
                body: opts.body ? JSON.stringify(opts.body) : undefined,
              });
              if (!r.ok) throw new Error(`HTTP ${r.status} on ${method} ${path}`);
              return await r.json();
            })();
            inflight.set(k, p);
            p.finally(() => inflight.delete(k));
            return p;
          }

          // streamUrl is NOT a fetch — it's URL construction for <audio>.src
          function streamUrl(t) {
            const id = encodeURIComponent(t.id || '');
            const source = encodeURIComponent(t.source || '');
            const url = encodeURIComponent(t.stream_url || '');
            const title = encodeURIComponent(t.title || '');
            const artist = encodeURIComponent(t.artist || '');
            return `${base}/stream/${id}?source=${source}&url=${url}&title=${title}&artist=${artist}`;
          }

          return {
            wave:       (mood)        => req(`/wave?user_id=${Tg.USER_ID}&mood=${encodeURIComponent(mood || '')}`),
            waveMoods:  ()            => req(`/wave/moods?user_id=${Tg.USER_ID}`),
            search:     (q, src)      => req(`/search?q=${encodeURIComponent(q)}${src && src !== 'all' ? `&sources=${src}` : ''}&user_id=${Tg.USER_ID}`),
            genre:      (name)        => req(`/genre?q=${encodeURIComponent(name)}&user_id=${Tg.USER_ID}`),
            stats:      ()            => req(`/library/stats`),
            taste:      ()            => req(`/taste/${Tg.USER_ID}`),
            likes:      ()            => req(`/library/likes?user_id=${Tg.USER_ID}`),
            like:       (t)           => req(`/like`, { method: 'POST', body: { user_id: Tg.USER_ID, track_id: t.id, is_like: true, track: t } }),
            feedback:   (ev)          => req(`/wave/feedback`,   { method: 'POST', body: ev }),
            streamUrl,
          };
        })();

        // ===== PLAYBACK ENGINE (Phase 2) =====
        // Sole owner of audioA/audioB, playback Store keys, MediaSession, volume.
        const PlaybackEngine = (() => {
          const audioA = document.getElementById('audioA');
          const audioB = document.getElementById('audioB');
          let activeAudio = audioA;
          let nextAudio = audioB;

          // Feedback bookkeeping
          let currentTrackStart = 0;
          let lastFeedbackSent = false;

          // Volume (persisted in localStorage)
          let _volume = parseFloat(localStorage.getItem('volume') || '1');
          let _muted = false;
          audioA.volume = _volume;
          audioB.volume = _volume;

          // iOS autoplay unlock flag
          let _audioUnlocked = false;

          // === iOS autoplay unlock ===
          function unlockAudio() {
            if (_audioUnlocked) return;
            const silentPlay = () => {
              const a = activeAudio;
              const wasSrc = a.src;
              // Attempt a silent play from user gesture to unlock WebKit audio
              a.muted = true;
              a.play().then(() => { a.pause(); a.muted = false; a.currentTime = 0; _audioUnlocked = true; })
                      .catch(() => { a.muted = false; });
            };
            document.addEventListener('touchstart', silentPlay, { once: true });
            document.addEventListener('click', silentPlay, { once: true });
          }

          // === Named event handlers (addEventListener, not .on*) ===
          function _wireEvents(audio) {
            // Remove old listeners first (safe even if not attached)
            audio.removeEventListener('timeupdate', _onTimeUpdate);
            audio.removeEventListener('ended', _onTrackEnded);
            audio.removeEventListener('loadedmetadata', _onLoadedMetadata);
            audio.removeEventListener('error', _onError);
            audio.removeEventListener('stalled', _onStalled);
            audio.removeEventListener('waiting', _onWaiting);
            audio.removeEventListener('playing', _onPlaying);
            // Add
            audio.addEventListener('timeupdate', _onTimeUpdate);
            audio.addEventListener('ended', _onTrackEnded);
            audio.addEventListener('loadedmetadata', _onLoadedMetadata);
            audio.addEventListener('error', _onError);
            audio.addEventListener('stalled', _onStalled);
            audio.addEventListener('waiting', _onWaiting);
            audio.addEventListener('playing', _onPlaying);
          }

          function _onTimeUpdate() {
            // Update MediaSession position ~1Hz (throttled)
            _updatePositionState();
          }

          function _onLoadedMetadata() {
            Store.set({ duration: activeAudio.duration || 0 });
            _updatePositionState();
          }

          function _onTrackEnded() {
            sendFeedbackInternal('finish');
            next();
          }

          let _retried = false; // one retry per track
          function _onError() {
            if (!_retried) {
              _retried = true;
              console.warn('[PlaybackEngine] stream error, retrying…');
              activeAudio.load();
              activeAudio.play().catch(() => {
                console.warn('[PlaybackEngine] retry failed, skipping');
                next();
              });
            } else {
              console.warn('[PlaybackEngine] stream error after retry, skipping');
              next();
            }
          }

          function _onStalled() {
            Store.set({ isPlaying: false }); // show buffering state
          }

          function _onWaiting() {
            Store.set({ isPlaying: false });
          }

          function _onPlaying() {
            Store.set({ isPlaying: true });
          }

          // === MediaSession ===
          let _posThrottle = 0;
          function _updatePositionState() {
            if (!('mediaSession' in navigator)) return;
            const now = Date.now();
            if (now - _posThrottle < 1000) return; // ~1Hz
            _posThrottle = now;
            const dur = activeAudio.duration;
            if (!dur || !isFinite(dur)) return;
            try {
              navigator.mediaSession.setPositionState({
                duration: dur,
                playbackRate: activeAudio.playbackRate || 1,
                position: Math.min(activeAudio.currentTime, dur),
              });
            } catch (e) {}
          }

          function initMediaSession() {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.setActionHandler('play',          () => toggle());
            navigator.mediaSession.setActionHandler('pause',         () => toggle());
            navigator.mediaSession.setActionHandler('previoustrack', () => prev());
            navigator.mediaSession.setActionHandler('nexttrack',     () => next());
            navigator.mediaSession.setActionHandler('seekto',        (d) => { if (d.seekTime != null) seek(d.seekTime); });
            navigator.mediaSession.setActionHandler('seekbackward',  (d) => seek(getPosition() - (d.seekOffset || 15)));
            navigator.mediaSession.setActionHandler('seekforward',   (d) => seek(getPosition() + (d.seekOffset || 15)));
          }

          function setMetadata(t) {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.metadata = new MediaMetadata({
              title:  t.title  || '',
              artist: t.artist || '',
              artwork: t.thumb ? [{ src: t.thumb, sizes: '512x512', type: 'image/jpeg' }] : [],
            });
          }

          // === Public: play a context (queue + index) ===
          function playContext(ctx, tracks, index) {
            Store.set({ playbackCtx: ctx, queue: tracks.slice(), queueIndex: index });
            return playAt(index);
          }

          // === Public: play track at index in current queue ===
          async function playAt(i) {
            const queue = Store.get('queue');
            if (i < 0 || i >= queue.length) return;
            Store.set({ queueIndex: i });
            const t = queue[i];
            Store.set({ currentTrack: t });

            currentTrackStart = Date.now();
            lastFeedbackSent = false;
            _retried = false;

            // Swap dual buffers
            const prev = activeAudio;
            activeAudio = (activeAudio === audioA) ? audioB : audioA;
            nextAudio   = (nextAudio   === audioA) ? audioB : audioA;
            prev.pause();

            // Apply volume to active buffer
            activeAudio.volume = _muted ? 0 : _volume;

            const url = Api.streamUrl(t);
            if (activeAudio.src !== url) {
              activeAudio.src = url;
            }

            _wireEvents(activeAudio);
            setMetadata(t);

            try {
              await activeAudio.play();
              Store.set({ isPlaying: true });
              preloadNext();
              autoExtendIfWave();
            } catch (e) {
              Store.set({ isPlaying: false });
              console.warn('[PlaybackEngine] play() failed', e);
            }
          }

          function preloadNext() {
            const queue = Store.get('queue');
            const idx = Store.get('queueIndex');
            const nx = queue[idx + 1];
            if (!nx) return;
            nextAudio.src = Api.streamUrl(nx);
            nextAudio.preload = 'auto';
            try { nextAudio.load(); } catch (e) {}
          }

          function autoExtendIfWave() {
            if (Store.get('playbackCtx') !== 'wave') return;
            const queue = Store.get('queue');
            const idx = Store.get('queueIndex');
            if (idx >= queue.length - 3) {
              HomeScreen.loadWave(false);
            }
          }

          function sendFeedbackInternal(action) {
            if (lastFeedbackSent) return;
            lastFeedbackSent = true;
            const idx = Store.get('queueIndex');
            if (idx < 0) return;
            const t = Store.get('queue')[idx];
            if (!t) return;
            Api.feedback({
              user_id: Tg.USER_ID,
              track_id: t.id,
              action,
              elapsed: Math.round((Date.now() - currentTrackStart) / 1000),
            }).catch(() => {});
          }

          // === Public controls ===
          function play()  { if (activeAudio.src) { activeAudio.play(); Store.set({ isPlaying: true }); } }
          function pause() { activeAudio.pause(); Store.set({ isPlaying: false }); }
          function toggle() {
            if (!activeAudio.src) return;
            if (activeAudio.paused) play(); else pause();
          }
          function next() { sendFeedbackInternal('skip'); playAt(Store.get('queueIndex') + 1); }
          function prev() { playAt(Store.get('queueIndex') - 1); }
          function seek(seconds) {
            if (!activeAudio.duration) return;
            activeAudio.currentTime = Math.max(0, Math.min(seconds, activeAudio.duration));
            _updatePositionState();
          }
          function seekPct(pct) {
            if (!activeAudio.duration) return;
            activeAudio.currentTime = (pct / 100) * activeAudio.duration;
            _updatePositionState();
          }

          // === Volume ===
          function setVolume(v) {
            _volume = Math.max(0, Math.min(1, v));
            _muted = false;
            activeAudio.volume = _volume;
            nextAudio.volume = _volume;
            localStorage.setItem('volume', String(_volume));
          }
          function toggleMute() {
            _muted = !_muted;
            activeAudio.volume = _muted ? 0 : _volume;
          }
          function getVolume() { return _volume; }
          function isMuted() { return _muted; }

          // === Read-through position ===
          function getPosition() { return activeAudio.currentTime || 0; }
          function getDuration() { return activeAudio.duration || 0; }
          function isPaused()    { return activeAudio.paused; }

          // === Manual feedback (not guarded) ===
          function sendManualFeedback(action) {
            const idx = Store.get('queueIndex');
            if (idx < 0) return;
            const t = Store.get('queue')[idx];
            if (!t) return;
            Api.feedback({
              user_id: Tg.USER_ID,
              track_id: t.id,
              action,
              elapsed: Math.round((Date.now() - currentTrackStart) / 1000),
            }).catch(() => {});
          }

          initMediaSession();
          unlockAudio();

          return {
            playContext, playAt, play, pause, toggle, next, prev,
            seek, seekPct, getPosition, getDuration, isPaused,
            setVolume, toggleMute, getVolume, isMuted,
            sendManualFeedback,
          };
        })();

        // ===== FEEDBACK =====
        // Phase 1 stub. Real reliable queue (with localStorage backing + visibilitychange flush)
        // is Phase 2 scope. For now Feedback is just a thin pass-through to Api so call sites
        // (PlaybackEngine.sendFeedbackInternal, future Wave swipes) have a stable name to call.
        const Feedback = (() => {
          function send(event) { return Api.feedback(event).catch(() => {}); }
          return { send };
        })();

        // ===== ROUTER =====
        // Router IIFE — state machine for screens + overlay flag mutators.
        // Router is the SOLE writer of Store keys: screen, fullscreenOpen, queuePanelOpen.
        // BackButton precedence (ARCHITECTURE.md §3): queuePanelOpen → fullscreenOpen → stack → tg.close().
        const Router = (() => {
          const stack = [];

          function go(screen, opts = {}) {
            const prev = Store.get('screen');
            if (opts.push !== false && prev !== screen) stack.push(prev);
            Store.set({ screen });
            updateBackButton();
          }

          function back() {
            // Precedence order (must NOT change without updating ARCHITECTURE.md §3):
            //   1. queuePanelOpen → close queue panel
            //   2. fullscreenOpen → close fullscreen
            //   3. stack non-empty → pop screen
            //   4. otherwise → tg.close()
            if (Store.get('queuePanelOpen')) { Store.set({ queuePanelOpen: false }); return; }
            if (Store.get('fullscreenOpen')) { Store.set({ fullscreenOpen: false }); return; }
            if (stack.length) { Store.set({ screen: stack.pop() }); updateBackButton(); return; }
            Tg.tg.close();
          }

          function updateBackButton() {
            const canGoBack =
                 Store.get('fullscreenOpen')
              || Store.get('queuePanelOpen')
              || stack.length > 0;
            if (canGoBack) Tg.tg.BackButton.show();
            else           Tg.tg.BackButton.hide();
          }

          // === Overlay mutators — Router is the ONLY writer of fullscreenOpen / queuePanelOpen ===
          // Components (MiniPlayer, FullscreenPlayer, QueuePanel) MUST call these instead of
          // writing Store.set({ fullscreenOpen: ... }) directly. This enforces ARCH-1
          // "exactly one module writes each key" for the overlay flags.
          function openFullscreen()  { Store.set({ fullscreenOpen: true });  }
          function closeFullscreen() { Store.set({ fullscreenOpen: false }); }
          function openQueuePanel()  { Store.set({ queuePanelOpen: true });  }
          function closeQueuePanel() { Store.set({ queuePanelOpen: false }); }

          // Wire BackButton once
          Tg.tg.BackButton.onClick(back);

          // React to overlay flag changes from other modules
          Store.subscribe(['fullscreenOpen', 'queuePanelOpen'], updateBackButton);

          return { go, back, updateBackButton, openFullscreen, closeFullscreen, openQueuePanel, closeQueuePanel };
        })();

        // ===== COMPONENTS =====

        const MiniPlayer = (() => {
          let root, unsubTrack, unsubPlaying;

          function templateTrack(t) {
            if (!t) return '';
            return `
              <img id="mp-thumb" src="${Utils.escapeHtml(t.thumb || '')}">
              <div class="mp-info">
                <div id="mp-title">${Utils.escapeHtml(t.title || '')}</div>
                <div id="mp-artist">${Utils.escapeHtml(t.artist || '')}</div>
              </div>
              <div id="mp-play-btn" data-action="toggle">${Store.get('isPlaying') ? '⏸' : '▶'}</div>
            `;
          }

          // Full re-render only on currentTrack change (rare event).
          function renderTrack() {
            const t = Store.get('currentTrack');
            root.style.display = t ? 'flex' : 'none';
            root.innerHTML = templateTrack(t);
            hydrate();
          }

          // Surgical patch on isPlaying change — do NOT rewrite innerHTML.
          function patchPlayIcon() {
            const btn = root.querySelector('#mp-play-btn');
            if (btn) btn.innerText = Store.get('isPlaying') ? '⏸' : '▶';
          }

          function hydrate() {
            // Single delegated click on root: tap on play btn → toggle, tap elsewhere → expand FP.
            // IMPORTANT: MiniPlayer does NOT write fullscreenOpen directly. It calls Router.openFullscreen()
            // to keep Router as the single writer of that key (ARCH-1).
            root.onclick = (e) => {
              if (e.target.closest('[data-action="toggle"]')) {
                e.stopPropagation();
                PlaybackEngine.toggle();
              } else {
                Router.openFullscreen();
              }
            };
          }

          function mount(el) {
            root = el;
            unsubTrack   = Store.subscribe(['currentTrack'], renderTrack);
            unsubPlaying = Store.subscribe(['isPlaying'],    patchPlayIcon);
            renderTrack();
            // Hairline progress is a Phase 4 (MINI-4) concern — not implemented here.
          }

          function destroy() {
            if (unsubTrack)   unsubTrack();
            if (unsubPlaying) unsubPlaying();
            if (root) { root.innerHTML = ''; root.style.display = 'none'; }
          }

          return { mount, destroy };
        })();

        const FullscreenPlayer = (() => {
          let root, rafId, unsubTrack, unsubDuration, unsubPlaying, unsubOpen;
          let dragging = false;   // set while user is scrubbing #progress — rAF tick must not overwrite

          // Full template is used ONLY on currentTrack change (rare).
          // isPlaying and position updates NEVER rewrite innerHTML — they patch nodes surgically.
          function templateTrack(t) {
            t = t || {};
            return `
              <div class="fp-handle" data-action="close">▾</div>
              <img id="fp-cover" src="${Utils.escapeHtml(t.thumb || '')}">
              <div class="fp-meta">
                <div class="track-info">
                  <h2 id="fp-title">${Utils.escapeHtml(t.title || '')}</h2>
                  <p id="fp-artist">${Utils.escapeHtml(t.artist || '')}</p>
                </div>
                <div id="fp-fav-btn" class="icon-btn" style="font-size:26px;" data-action="like">🤍</div>
              </div>
              <div class="fp-progress-wrap">
                <input type="range" id="progress" value="0" min="0" max="100" step="0.1">
                <div class="fp-time">
                  <span id="fp-time-cur">0:00</span>
                  <span id="fp-time-total">${Utils.fmtTime(Store.get('duration'))}</span>
                </div>
              </div>
              <div class="fp-controls">
                <div data-action="prev">⏮</div>
                <div id="fp-play-btn" data-action="toggle">${Store.get('isPlaying') ? '⏸' : '▶'}</div>
                <div data-action="next">⏭</div>
              </div>
              <div class="fp-feedback">
                <div data-action="dislike">👎</div>
                <div data-action="like-feedback">👍</div>
              </div>
              <div class="fp-volume">
                <div class="vol-icon" data-action="mute">${PlaybackEngine.isMuted() ? '🔇' : '🔊'}</div>
                <input type="range" id="volume-slider" min="0" max="100" value="${Math.round(PlaybackEngine.getVolume() * 100)}" step="1">
              </div>
            `;
          }

          function renderTrack() {
            root.innerHTML = templateTrack(Store.get('currentTrack'));
            hydrate();
          }

          // Surgical patches — do NOT rewrite innerHTML. This keeps #progress range
          // focus/drag state, avoids flicker on pause/play, and is cheap on every
          // isPlaying/duration/tick event.
          function patchPlayIcon() {
            const btn = root.querySelector('#fp-play-btn');
            if (btn) btn.innerText = Store.get('isPlaying') ? '⏸' : '▶';
          }
          function patchDuration() {
            const el = root.querySelector('#fp-time-total');
            if (el) el.innerText = Utils.fmtTime(Store.get('duration'));
          }

          function hydrate() {
            root.onclick = (e) => {
              const action = e.target.closest('[data-action]')?.dataset.action;
              if (!action) return;
              switch (action) {
                case 'close':         Router.closeFullscreen();             break;   // Router owns fullscreenOpen
                case 'toggle':        PlaybackEngine.toggle();              break;
                case 'prev':          PlaybackEngine.prev();                break;
                case 'next':          PlaybackEngine.next();                break;
                case 'dislike': {
                  PlaybackEngine.sendManualFeedback('dislike');
                  const db = e.target.closest('[data-action="dislike"]');
                  if (db) { db.style.transform = 'scale(1.4)'; setTimeout(() => db.style.transform = '', 200); }
                  break;
                }
                case 'like-feedback': {
                  PlaybackEngine.sendManualFeedback('like');
                  const lb = e.target.closest('[data-action="like-feedback"]');
                  if (lb) { lb.style.transform = 'scale(1.4)'; setTimeout(() => lb.style.transform = '', 200); }
                  break;
                }
                case 'like': {
                  const t = Store.get('currentTrack');
                  if (!t) break;
                  const heart = root.querySelector('#fp-fav-btn');
                  if (heart) { heart.innerText = '❤️'; heart.style.transform = 'scale(1.3)'; setTimeout(() => heart.style.transform = '', 200); }
                  Api.like(t).catch(() => { if (heart) heart.innerText = '🤍'; });
                  break;
                }
                case 'mute': {
                  PlaybackEngine.toggleMute();
                  const icon = e.target.closest('[data-action="mute"]');
                  const slider = root.querySelector('#volume-slider');
                  if (icon) icon.innerText = PlaybackEngine.isMuted() ? '🔇' : '🔊';
                  if (slider) slider.value = PlaybackEngine.isMuted() ? 0 : Math.round(PlaybackEngine.getVolume() * 100);
                  break;
                }
              }
            };
            // Range scrub — track drag state so rAF tick doesn't fight the user's finger.
            const range = root.querySelector('#progress');
            if (range) {
              range.oninput       = () => PlaybackEngine.seekPct(parseFloat(range.value));
              range.onpointerdown = () => { dragging = true; };
              range.onpointerup   = () => { dragging = false; };
              range.ontouchstart  = () => { dragging = true; };
              range.ontouchend    = () => { dragging = false; };
            }
            // Volume slider
            const volSlider = root.querySelector('#volume-slider');
            if (volSlider) {
              volSlider.oninput = () => {
                PlaybackEngine.setVolume(parseInt(volSlider.value) / 100);
                const icon = root.querySelector('.vol-icon');
                if (icon) icon.innerText = parseInt(volSlider.value) === 0 ? '🔇' : '🔊';
              };
            }
          }

          function tickProgress() {
            if (!Store.get('fullscreenOpen')) {
              cancelAnimationFrame(rafId);
              rafId = null;
              return;
            }
            const cur  = root.querySelector('#fp-time-cur');
            const prog = root.querySelector('#progress');
            const pos  = PlaybackEngine.getPosition();
            const dur  = PlaybackEngine.getDuration();
            if (cur)  cur.innerText = Utils.fmtTime(pos);
            if (prog && dur && !dragging) prog.value = (pos / dur) * 100;
            rafId = requestAnimationFrame(tickProgress);
          }

          function syncOpen() {
            const open = Store.get('fullscreenOpen');
            root.classList.toggle('open', open);
            if (open && !rafId) tickProgress();
          }

          function mount(el) {
            root = el;
            // Full re-render only on track change. isPlaying / duration patch in place.
            unsubTrack    = Store.subscribe(['currentTrack'],    renderTrack);
            unsubPlaying  = Store.subscribe(['isPlaying'],       patchPlayIcon);
            unsubDuration = Store.subscribe(['duration'],        patchDuration);
            unsubOpen     = Store.subscribe(['fullscreenOpen'],  syncOpen);
            renderTrack();
            syncOpen();
          }

          function destroy() {
            cancelAnimationFrame(rafId);
            if (unsubTrack)    unsubTrack();
            if (unsubPlaying)  unsubPlaying();
            if (unsubDuration) unsubDuration();
            if (unsubOpen)     unsubOpen();
            if (root) root.innerHTML = '';
          }

          return { mount, destroy };
        })();

        const QueuePanel = (() => {
          let root, unsub, unsubOpen;

          function template(state) {
            // Phase 1 stub. Real bottom-sheet UI with History/Now Playing/Up Next sections,
            // SortableJS reorder, swipe-left remove, long-press action sheet — Phase 6.
            const queue = state.queue || [];
            const idx = state.queueIndex;
            if (!queue.length) return `<p class="empty">Очередь пуста</p>`;
            return `
              <div class="qp-list">
                ${queue.map((t, i) => `
                  <div class="qp-row${i === idx ? ' is-current' : ''}">
                    <span class="qp-title">${Utils.escapeHtml(t.title || '')}</span>
                    <span class="qp-artist">${Utils.escapeHtml(t.artist || '')}</span>
                  </div>
                `).join('')}
              </div>
            `;
          }

          function render() {
            if (!root) return;
            root.innerHTML = template({
              queue: Store.get('queue'),
              queueIndex: Store.get('queueIndex'),
            });
          }

          function syncOpen() {
            const open = Store.get('queuePanelOpen');
            root.style.display = open ? 'block' : 'none';
          }

            root = el;
            unsub     = Store.subscribe(['queue', 'queueIndex'], render);
            unsubOpen = Store.subscribe(['queuePanelOpen'], syncOpen);
            render();
            syncOpen();
          }

          function destroy() {
            if (unsub)     unsub();
            if (unsubOpen) unsubOpen();
            if (root) root.innerHTML = '';
          }

          return { mount, render, destroy };
        })();

        // ===== Track-list delegation helper (shared by HomeScreen/SearchScreen/GenreScreen) =====
        function attachTrackListDelegate(rootEl, getTracks, ctx) {
          rootEl.onclick = (e) => {
            const row = e.target.closest('[data-idx]');
            if (!row) return;
            const idx = parseInt(row.dataset.idx, 10);
            const tracks = getTracks();
            const t = tracks[idx];
            if (!t) return;
            const action = e.target.closest('[data-action]')?.dataset.action;
            if (action === 'like') {
              const btn = e.target.closest('[data-action="like"]');
              if (btn) { btn.innerText = '❤️'; btn.style.transform = 'scale(1.3)'; setTimeout(() => btn.style.transform = '', 200); }
              Api.like(t).catch(() => { if (btn) btn.innerText = '🤍'; });
              return;
            }
            if (action === 'play') {
              if (ctx === 'wave') {
                PlaybackEngine.playAt(idx);
              } else {
                PlaybackEngine.playContext(ctx, tracks, idx);
              }
            }
          };
        }

        // ===== TrackCard — pure render function =====
        const TrackCard = (() => {
          function render(t, idx, ctx) {
            const src = (t.source || '').toLowerCase();
            const srcIcon = Config.SOURCE_ICONS[src] || '';
            return `
              <div class="track-item" data-idx="${idx}" data-ctx="${ctx}">
                <img src="${Utils.escapeHtml(t.thumb || '')}" class="track-thumb" onerror="this.style.opacity=0.3">
                <div class="track-info" data-action="play">
                  <div class="track-title">${srcIcon ? `<span class="source-icon">${srcIcon}</span>` : ''}${Utils.escapeHtml(t.title || '')}</div>
                  <div class="track-artist">${Utils.escapeHtml(t.artist || '')}</div>
                </div>
                <div class="track-actions">
                  <div class="icon-btn" data-action="like">🤍</div>
                </div>
              </div>
            `;
          }
          return { render };
        })();

        // ===== MoodPicker (child of HomeScreen) =====
        const MoodPicker = (() => {
          let root;
          async function load() {
            try {
              const d = await Api.waveMoods();
              const moods = d.moods || [];
              const cur = Store.get('waveMood');
              root.innerHTML = `<div class="mood-card${cur === '' ? ' active' : ''}" data-mood="">✨ Все</div>` +
                moods.map(m => {
                  const id = m.id || m.name;
                  return `<div class="mood-card${cur === id ? ' active' : ''}" data-mood="${Utils.escapeHtml(id)}"><span class="mood-emoji">${m.emoji || ''}</span>${Utils.escapeHtml(m.name)}</div>`;
                }).join('');
            } catch (e) { root.innerHTML = ''; }
          }
          function hydrate() {
            root.onclick = (e) => {
              const card = e.target.closest('[data-mood]');
              if (!card) return;
              Store.set({ waveMood: card.dataset.mood, waveEnded: false, queue: [] });
              root.querySelectorAll('.mood-card').forEach(c => c.classList.remove('active'));
              card.classList.add('active');
              HomeScreen.reload();
            };
          }
          function mount(el) { root = el; load().then(hydrate); }
          function destroy() { if (root) root.innerHTML = ''; }
          return { mount, destroy };
        })();

        // ===== HomeScreen (Wave tab) =====
        const HomeScreen = (() => {
          let root, listEl, loaderEl;

          function ensureMarkup() {
            listEl   = root.querySelector('#wave-list');
            loaderEl = root.querySelector('#wave-loader');
          }

          async function loadWave(reset) {
            if (Store.get('waveLoading') || Store.get('waveEnded')) return;
            Store.set({ waveLoading: true });
            if (loaderEl) loaderEl.style.display = 'block';
            try {
              const d = await Api.wave(Store.get('waveMood'));
              const tracks = d.tracks || [];
              if (!tracks.length) Store.set({ waveEnded: true });
              const prevQueue = Store.get('queue');
              const newQueue = reset ? tracks.slice() : prevQueue.concat(tracks);
              Store.set({ queue: newQueue, playbackCtx: 'wave' });
              if (reset) listEl.innerHTML = '';
              const startIdx = reset ? 0 : (newQueue.length - tracks.length);
              listEl.insertAdjacentHTML('beforeend',
                tracks.map((t, i) => TrackCard.render(t, startIdx + i, 'wave')).join('')
              );
            } catch (e) {
              listEl.insertAdjacentHTML('beforeend', '<p class="empty">Не удалось загрузить волну</p>');
            }
            Store.set({ waveLoading: false });
            if (loaderEl) loaderEl.style.display = 'none';
          }

          function reload() {
            Store.set({ queue: [], waveEnded: false });
            if (listEl) listEl.innerHTML = '';
            loadWave(true);
          }

          function mount(el) {
            root = el;
            ensureMarkup();
            MoodPicker.mount(root.querySelector('#mood-scroll'));
            attachTrackListDelegate(listEl, () => Store.get('queue'), 'wave');
            const ca = document.getElementById('content-area');
            ca.addEventListener('scroll', (e) => {
              if (Store.get('screen') !== 'wave') return;
              const el2 = e.target;
              if (el2.scrollHeight - el2.scrollTop - el2.clientHeight < 500) loadWave(false);
            });
            loadWave(true);
          }

          function destroy() { /* Phase 1: mounted once */ }

          return { mount, destroy, reload, loadWave };
        })();

        // ===== SourceChips (child of SearchScreen) =====
        const SourceChips = (() => {
          function mount(rootEl, storeKey, onChange) {
            const active = Store.get(storeKey);
            rootEl.innerHTML = Config.SOURCES.map(s =>
              `<div class="chip${s.id === active ? ' active' : ''}" data-src="${s.id}">${Utils.escapeHtml(s.name)}</div>`
            ).join('');
            rootEl.onclick = (e) => {
              const chip = e.target.closest('[data-src]');
              if (!chip) return;
              rootEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
              chip.classList.add('active');
              Store.set({ [storeKey]: chip.dataset.src });
              onChange(chip.dataset.src);
            };
          }
          return { mount };
        })();

        // ===== SearchScreen (Search tab) =====
        const SearchScreen = (() => {
          let root, inputEl, resultsEl, timer = null;

          async function doSearch() {
            const q = inputEl.value.trim();
            if (!q) { resultsEl.innerHTML = '<p class="empty">Начните вводить запрос</p>'; return; }
            resultsEl.innerHTML = '<p class="loading">Ищем…</p>';
            try {
              const d = await Api.search(q, Store.get('activeSource'));
              const tracks = d.tracks || [];
              Store.set({ searchTabResults: tracks });
              resultsEl.innerHTML = tracks.length
                ? tracks.map((t, i) => TrackCard.render(t, i, 'search-tab')).join('')
                : '<p class="empty">Ничего не найдено</p>';
            } catch (e) { resultsEl.innerHTML = '<p class="empty">Ошибка поиска</p>'; }
          }

          function mount(el) {
            root = el;
            inputEl   = root.querySelector('#search-tab-input');
            resultsEl = root.querySelector('#search-tab-results');
            SourceChips.mount(root.querySelector('#source-chips'), 'activeSource', () => doSearch());
            inputEl.addEventListener('input', () => {
              clearTimeout(timer);
              timer = setTimeout(doSearch, 500);
            });
            attachTrackListDelegate(resultsEl, () => Store.get('searchTabResults') || [], 'search-tab');
          }
          function destroy() {}
          return { mount, destroy };
        })();

        // SearchModal — removed (dedicated Search tab exists)

        // ===== GenreScreen (Genres tab) =====
        const GenreScreen = (() => {
          let root, gridEl, resultsEl, listEl, titleEl;
          function renderGrid() {
            gridEl.innerHTML = Config.GENRES.map(g => `
              <div class="genre-card" style="background:${g.grad}" data-genre="${Utils.escapeHtml(g.name)}">
                <div class="g-emoji">${g.emoji}</div>
                <div class="g-name">${Utils.escapeHtml(g.name)}</div>
              </div>`).join('');
          }
          async function loadGenre(name) {
            gridEl.style.display = 'none';
            resultsEl.style.display = 'block';
            titleEl.innerText = name;
            listEl.innerHTML = '<p class="loading">Загружаем…</p>';
            try {
              const d = await Api.genre(name);
              const tracks = d.tracks || [];
              Store.set({ genreResults: tracks });
              listEl.innerHTML = tracks.length
                ? tracks.map((t, i) => TrackCard.render(t, i, 'genre')).join('')
                : '<p class="empty">Пусто</p>';
            } catch (e) { listEl.innerHTML = '<p class="empty">Ошибка загрузки</p>'; }
          }
          function mount(el) {
            root = el;
            gridEl    = root.querySelector('#genre-grid');
            resultsEl = root.querySelector('#genre-results');
            listEl    = root.querySelector('#genre-list');
            titleEl   = root.querySelector('#genre-results-title');
            renderGrid();
            gridEl.onclick = (e) => {
              const card = e.target.closest('[data-genre]');
              if (card) loadGenre(card.dataset.genre);
            };
            root.querySelector('.back-btn').onclick = () => {
              gridEl.style.display = 'grid';
              resultsEl.style.display = 'none';
            };
            attachTrackListDelegate(listEl, () => Store.get('genreResults') || [], 'genre');
          }
          function destroy() {}
          return { mount, destroy };
        })();

        // ===== LibraryScreen (Collection tab) =====
        const LibraryScreen = (() => {
          let root, resultsEl;
          async function load() {
            resultsEl.innerHTML = '<p class="loading">Загружаем лайки…</p>';
            try {
              const d = await Api.likes();
              const tracks = d.tracks || [];
              Store.set({ collectionResults: tracks });
              resultsEl.innerHTML = tracks.length
                ? tracks.map((t, i) => TrackCard.render(t, i, 'collection')).join('')
                : '<p class="empty">Пока нет лайков</p>';
            } catch (e) { resultsEl.innerHTML = '<p class="empty">Ошибка загрузки</p>'; }
          }
          function mount(el) {
            root = el;
            resultsEl = root.querySelector('#collection-results');
            attachTrackListDelegate(resultsEl, () => Store.get('collectionResults') || [], 'collection');
            Store.subscribe(['screen'], (state) => { if (state.screen === 'collection') load(); });
          }
          function destroy() {}
          return { mount, destroy, reload: load };
        })();

        // ===== TasteBars (child of ProfileScreen) =====
        const TasteBars = (() => {
          let root, unsub;
          function render() {
            const taste = Store.get('taste');
            if (!taste || !taste.length) {
              root.innerHTML = '<p style="color:var(--text-muted); font-size:13px;">Слушайте больше, чтобы появился профиль</p>';
              return;
            }
            const max = Math.max(...taste.map(t => t.weight || t.score || 0), 1);
            root.innerHTML = taste.slice(0, 8).map(t => {
              const w = t.weight || t.score || 0;
              const pct = Math.round((w / max) * 100);
              return `<div class="taste-row">
                <div class="taste-label"><span>${Utils.escapeHtml(t.name || t.tag || '')}</span><span>${pct}%</span></div>
                <div class="taste-bar"><div class="taste-fill" style="width:${pct}%"></div></div>
              </div>`;
            }).join('');
          }
          function mount(el) { root = el; unsub = Store.subscribe(['taste'], render); render(); }
          function destroy() { if (unsub) unsub(); }
          return { mount, destroy };
        })();

        // ===== ProfileScreen (Profile tab) =====
        const ProfileScreen = (() => {
          let root, statsEl, resetBtn;
          async function load() {
            try {
              const [taste, stats] = await Promise.all([Api.taste(), Api.stats()]);
              Store.set({ taste: taste.profile || taste.tags || [], stats });
              renderStats(stats);
            } catch (e) { /* TasteBars handles empty */ }
          }
          function renderStats(s) {
            const items = [
              { v: s.tracks_indexed || s.tracks_on_pc || 0, l: 'Треков в базе' },
              { v: formatBytes(s.library_bytes || 0),       l: 'Размер библиотеки' },
            ];
            statsEl.innerHTML = items.map(i =>
              `<div class="stat-box"><div class="stat-value">${i.v}</div><div class="stat-label">${Utils.escapeHtml(i.l)}</div></div>`
            ).join('');
          }
          function formatBytes(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
            return (b / 1073741824).toFixed(1) + ' GB';
          }
          function mount(el) {
            root = el;
            statsEl  = root.querySelector('#stat-grid');
            resetBtn = root.querySelector('.btn-danger');
            TasteBars.mount(root.querySelector('#taste-bars'));
            // Reset button hidden until backend API exists
            if (resetBtn) resetBtn.style.display = 'none';
            Store.subscribe(['screen'], (state) => { if (state.screen === 'profile') load(); });
          }
          function destroy() {}
          return { mount, destroy };
        })();

        // ===== BottomNav =====
        const BottomNav = (() => {
          let root, unsub;
          function render() {
            const s = Store.get('screen');
            root.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === s));
          }
          function mount(el) {
            root = el;
            root.onclick = (e) => {
              const item = e.target.closest('[data-tab]');
              if (!item) return;
              Router.go(item.dataset.tab, { push: false });
            };
            unsub = Store.subscribe(['screen'], render);
            render();
          }
          function destroy() { if (unsub) unsub(); }
          return { mount, destroy };
        })();

        // ===== BOOT =====
        // Single entry-point. All mounts in dependency order (overlays → screens → nav → modal).
        // Called synchronously at the bottom of the script — DOM is ready because the script
        // tag lives at the end of <body>.
        function Boot() {
          // Mount overlays (always present; visibility toggled via Store flags)
          MiniPlayer.mount(document.getElementById('mini-player'));
          FullscreenPlayer.mount(document.getElementById('full-player'));
          QueuePanel.mount(document.getElementById('queue-panel'));

          // Mount screens (all 5 mounted once; tab visibility toggled by screen subscribe below)
          HomeScreen.mount(document.getElementById('tab-wave'));
          SearchScreen.mount(document.getElementById('tab-search'));
          GenreScreen.mount(document.getElementById('tab-genres'));
          LibraryScreen.mount(document.getElementById('tab-collection'));
          ProfileScreen.mount(document.getElementById('tab-profile'));

          // Mount chrome
          BottomNav.mount(document.querySelector('.bottom-nav'));

          // Tab visibility sync (Phase 12 will replace this with proper mount/unmount)
          Store.subscribe(['screen'], (state) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            const tabEl = document.getElementById('tab-' + state.screen);
            if (tabEl) tabEl.classList.add('active');
          });

          // Seed Router with initial 'wave' screen (no history push)
          Router.go('wave', { push: false });
        }

        Boot();
    </script>
</body>
</html>
